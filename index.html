    'Rawls': { school:'Social Contract / Liberal Egalitarianism', key:'Veil of ignorance, original position, difference principle, justice as fairness',
      debateUse:'Rawls is incredibly powerful for policy debates involving inequality. The veil of ignorance thought experiment is intuitive and persuasive: design institutions as if you don\'t know your place in society. The difference principle says inequalities are only justified if they benefit the least advantaged — use this to evaluate any policy with distributional effects.',
      attack:'Vulnerable to: Nozick\'s entitlement theory (process vs. pattern), the charge that it\'s too idealized to apply to real politics, and communitarian critiques that it assumes an atomistic self.' },
    'Marx': { school:'Historical Materialism / Critical Theory', key:'Class struggle, surplus value, alienation, base and superstructure, dialectical materialism',
      debateUse:'Marx is essential for structural arguments about power, economics, and ideology. Use historical materialism to explain why surface-level reforms fail — they don\'t address the base (economic relations). The concept of ideology as superstructure helps you argue that cultural norms serve ruling-class interests. Alienation arguments are powerful for labor and education motions.',
      attack:'Vulnerable to: the calculation problem, historical failures of actually-existing socialism, the charge of economic determinism, and the problem of revolutionary violence.' },
    'Foucault': { school:'Post-Structuralism / Power Analysis', key:'Power/knowledge, disciplinary society, biopower, discourse, genealogy',
      debateUse:'Foucault is your tool for arguing that seemingly neutral institutions (prisons, hospitals, schools) are actually mechanisms of social control. Use power/knowledge to show that what counts as "truth" or "expertise" reflects power relations. Biopower is perfect for public health or population management motions. His genealogical method lets you denaturalize anything the opposition takes for granted.',
      attack:'Vulnerable to: the normative deficit problem (if all power relations are suspect, what grounds your critique?), relativism charges, and the practical objection that his analysis doesn\'t tell us what to do.' },
  };
  const info = data[philosopher] || {
    school: 'Various',
    key: 'Core concepts of this thinker',
    debateUse: `${philosopher}'s work provides valuable frameworks for analyzing questions of justice, power, knowledge, and ethics. Select this thinker when the motion touches on their core areas of inquiry.`,
    attack: 'Like any philosophical framework, this approach has known vulnerabilities that sophisticated opponents will target.'
  };
  return `<h3>${philosopher}</h3>
<p style="color:#ef4444;margin-bottom:12px"><strong>School:</strong> ${info.school}</p>
<h4>Key Concepts</h4>
<div class="section">${info.key}</div>

<div class="section">${info.debateUse}</div>

${concept ? `<h4>Applied to: "${escHtml(concept)}"</h4>
<div class="section">When deploying ${philosopher}'s framework to analyze "${escHtml(concept)}", focus on connecting the abstract principles to concrete mechanisms. Your opponent will try to dismiss the philosophy as too theoretical — ground it in specific real-world impacts that flow from the philosophical commitment.</div>` : ''}`;
}

function CaseFeedback() {
  const el = React.createElement;

  const [segments, setSegments] = useState([]); // [{text, commentId?}]
  const [activeComment, setActiveComment] = useState(null);
  const [replyText, setReplyText] = useState('');
  const [revising, setRevising] = useState(false);
  const caseRef = useRef(null);

  const [error, setError] = useState('');

  const analyze = async () => {
    if (!caseText.trim()) return;
    setError('');
    setLoading(true);
    setComments([]);
    setSegments([]);
    setActiveComment(null);

    const sysPrompt = `You are the most brutally honest APDA debate coach alive. You have coached Nationals champions. You do not sugarcoat. You have seen thousands of cases and you can smell a weak warrant from across the room. Your job is to review this case the way a real coach would in a prep session: sit down with the debater, read through the case, and tell them exactly what is wrong, what is good, and how a top opp team would tear them apart.

YOUR COACHING VOICE:
You sound like a real coach, not a feedback tool. Here's the difference:
BAD (feedback bot): "This warrant could benefit from additional specificity and development."
GOOD (real coach): "This warrant is doing nothing. You said 'economic harm' but you never told me WHO is harmed, HOW MUCH, or WHY I should care more about that than whatever opp is going to say. A halfway decent LO will just say 'so what?' and you won't have an answer."

BAD: "The framework provides a useful evaluative lens for the round."
GOOD: "Your framework says 'justice.' Cool. What does that actually tell the judge to do when your impact and opp's impact are sitting next to each other? Nothing. This is decorative philosophy. A framework needs to be a MACHINE: put two competing impacts in, get a winner out."

BAD: "Consider strengthening the causal chain in argument 2."
GOOD: "Your causal chain skips from A to C. You said the policy creates incentives, then jumped to 'this devastates communities.' What happens in between? How do those incentives actually translate into community harm? Any competent LO will park right in that gap."

WHAT TO EVALUATE:
1. WARRANT QUALITY: For each warrant, ask: is this specific enough that it could ONLY exist in this case? Or could you copy paste it into any debate? "This harms the economy" is garbage. "This creates a deadweight loss because subsidized producers have no incentive to respond to demand signals, exactly the dynamic that created the EU's butter mountains in the 1980s" is a warrant. Flag every generic warrant.

2. FRAMEWORK TEETH: Does the framework actually resolve disputes, or is it just vibes? Test it: if Gov's impact is X and Opp's impact is Y, does the framework tell the judge which one matters more? If not, it's broken.

3. STRATEGIC VULNERABILITY: This is the most important thing you do. Identify the single argument that a smart opp team would collapse on in the MO to win this round. Tell the debater: "If I'm opp, I'm spending 80% of my MO on THIS, and here's the 3-sentence version of why you lose."

4. AI SMELL TEST: Read each section and ask: does this sound like a confident debater who has done their research, or does it sound like a language model producing balanced analysis? Hedging ("it could be argued"), balance where there should be advocacy ("while there are merits to both sides"), Wikipedia-voice ("X is a concept that refers to"), essay transitions ("Furthermore," "Additionally," "Moreover"). Flag every instance.

5. CLICHE DETECTION: Flag any arguments that are so overrun in APDA that every competent opp team has pre-loaded responses. Generic slippery slopes, "education is intrinsically good," vague democracy impacts, "chilling effect" without naming what's chilled.

6. IMPACT CALCULUS: Are impacts just stated ("this is bad") or actually weighed ("this is worse than what they'll say because it's irreversible and affects more people")? Impact calculus should be pre-loaded into the case, not left for the MG to invent on the fly.

7. ARGUMENT INDEPENDENCE: Can each argument win the round alone? If argument 2 depends on argument 1 being true, that's not diversification. Flag dependent arguments.

8. CONCESSION READINESS: Does the case have a plan for what to concede? Every good case should be designed so you can lose one argument and still win the round. If losing any single argument collapses the whole case, that's a structural problem.

9. DEPTH VS. BREADTH: Is this case playing chess or checkers? If it has 5 shallow arguments where each warrant could be dismissed in one sentence, it is checkers. If it has 2-3 deep arguments where each warrant survives the three most obvious responses, it is chess. Chess beats checkers. Flag cases that spread too thin and tell the debater which arguments to cut and which to deepen.

10. COUNTERFACTUAL CLARITY: Does the case define what happens if the motion DOESN'T pass? If not, the case is arguing in a vacuum. Every argument should be comparative: "In the world where X passes vs. the world where it doesn't, here is what changes." If the case never defines the counterfactual, any opp team can substitute their own favorable alternative and the case collapses.

11. ARGUMENT STRESS TEST: For each core argument, apply this test from elite debaters: "How many reasonable, damning responses can someone throw at this? How well does the argument insulate itself?" If the argument can be killed by one obvious response that the case doesn't address, it needs pre-loaded defense or it needs to be rebuilt. The goal is arguments where the most natural first-instinct response from opp FAILS.

12. PRINCIPLED AND CONSEQUENTIALIST LAYERS: Does the case operate on only one level? The most robust cases give the judge multiple independent frameworks. If opp wins the consequentialist debate, does a principled argument still stand? If opp wins the principled debate, do the consequences still favor Gov? A case that only operates on one layer is fragile.

TONE: Mix honest criticism with genuine encouragement. If a warrant is actually clever, say so: "This is genuinely good. A top team would struggle to answer this cleanly. Protect it in the MG." But NEVER praise mediocre work. The debater needs to know the difference between a 28-speak warrant and a 33-speak warrant.

FORMATTING: Do not use em dashes, en dashes, or hyphens as separators in your feedback. Use periods, commas, and natural sentence structure instead.

Return ONLY valid JSON in this exact format, no text before or after:
[
  {"excerpt": "exact verbatim text from the case", "feedback": "your brutally honest coaching feedback"},
  ...
]

Rules:
- Identify 6-10 sections. Mix positive and negative.
- Each excerpt must be an EXACT substring of the case text (verbatim, including punctuation)
- Feedback must be specific and strategic. Name the exact problem and suggest what to do instead.
- At least one comment MUST identify the biggest strategic vulnerability: "If I'm opp, I collapse on THIS."
- At least one comment MUST flag any section that sounds AI-generated and explain the tell
- At least one comment MUST evaluate the framework's ability to actually resolve the round
- At least one comment should be genuinely positive about something that's actually strong
- Order by position in the case (first excerpt appears earliest)
- Do not use markdown formatting in feedback`;

    try {
      let result = '';
      await callClaude(sysPrompt, `Here is the case to review:\n\n${caseText}`, (text) => {
        result = text;
      }, { thinkBudget: 10000, maxTokens: 16000 });

      // Parse JSON from response
      const jsonMatch = result.match(/\[[\s\S]*\]/);
      if (!jsonMatch) throw new Error('Invalid response format');
      const parsed = JSON.parse(jsonMatch[0]);

      // Build comments with positions
      const newComments = [];
      parsed.forEach((item, i) => {
        const idx = caseText.indexOf(item.excerpt);
        if (idx !== -1) {
          newComments.push({
            id: 'c' + i,
            excerpt: item.excerpt,
            startIdx: idx,
            endIdx: idx + item.excerpt.length,
            feedback: item.feedback,
            replies: [],
          });
        }
      });

      // Sort by position
      newComments.sort((a, b) => a.startIdx - b.startIdx);

      // Build segments for rendering
      const segs = [];
      let cursor = 0;
      newComments.forEach(c => {
        if (c.startIdx > cursor) {
          segs.push({ text: caseText.substring(cursor, c.startIdx) });
        }
        segs.push({ text: caseText.substring(c.startIdx, c.endIdx), commentId: c.id });
        cursor = c.endIdx;
      });
      if (cursor < caseText.length) {
        segs.push({ text: caseText.substring(cursor) });
      }

      setComments(newComments);
      setSegments(segs);
      setAnalyzed(true);
    } catch(e) {
      setError('Error analyzing case: ' + e.message);
      setAnalyzed(false);
    }
    setLoading(false);
  };

  const handleReply = async (commentId) => {
    if (!replyText.trim() || revising) return;
    const comment = comments.find(c => c.id === commentId);
    if (!comment) return;

    setRevising(true);
    const userReply = replyText.trim();
    setReplyText('');

    // Add user reply to comment
    setComments(prev => prev.map(c => c.id === commentId
      ? {...c, replies: [...c.replies, {role:'user', text:userReply}]}
      : c
    ));

    try {
      const sysPrompt = `You are an expert APDA debate case editor. The user has a specific section of their debate case that received feedback. They are now replying with instructions for how to improve it. Rewrite ONLY the highlighted section based on their instruction. Maintain the same style, tone, and format as the surrounding case. Return ONLY the rewritten text, nothing else. Do not use markdown formatting. Do not use em dashes, en dashes, or hyphens as separators.`;
      const userPrompt = `Full case for context:\n\n${caseText}\n\n---\nSection to revise:\n"${comment.excerpt}"\n\nOriginal feedback: ${comment.feedback}\n\nUser's instruction: ${userReply}\n\nRewrite this section:`;

      let revised = '';
      await callClaude(sysPrompt, userPrompt, (text) => {
        revised = text;
      }, { thinkBudget: 6000, maxTokens: 4000 });

      // Apply the revision
      const newCaseText = caseText.substring(0, comment.startIdx) + revised + caseText.substring(comment.endIdx);
      setCaseText(newCaseText);

      // Add AI reply
      setComments(prev => prev.map(c => c.id === commentId
        ? {...c, replies: [...c.replies, {role:'ai', text:'Section revised. Re-analyze to see updated feedback.'}], excerpt: revised, endIdx: comment.startIdx + revised.length}
        : c
      ));

      // Re-segment with updated text
      const newSegs = [];
      let cursor = 0;
      const updatedComments = comments.map(c => c.id === commentId
        ? {...c, excerpt: revised, endIdx: comment.startIdx + revised.length}
        : c
      );
      updatedComments.forEach(c => {
        if (c.startIdx > cursor) {
          newSegs.push({ text: newCaseText.substring(cursor, c.startIdx) });
        }
        newSegs.push({ text: newCaseText.substring(c.startIdx, c.startIdx + c.excerpt.length), commentId: c.id });
        cursor = c.startIdx + c.excerpt.length;
      });
      if (cursor < newCaseText.length) {
        newSegs.push({ text: newCaseText.substring(cursor) });
      }
      setSegments(newSegs);

    } catch(e) {
      setComments(prev => prev.map(c => c.id === commentId
        ? {...c, replies: [...c.replies, {role:'ai', text:'Error: ' + e.message}]}
        : c
      ));
    }
    setRevising(false);
  };

  // Input view
  if (!analyzed) {
    return el('div', {className:'panel panel-expanded'},
      el('label', {className:'field-label', style:{fontSize:'1.05rem',marginBottom:12}}, 'Paste Your Case'),
      el('textarea', {
        value: caseText,
        onChange: e => setCaseText(e.target.value),
        placeholder: 'Paste your full debate case here. Background, framework, arguments, everything. The AI will analyze it and give you targeted, section-by-section feedback...',
        rows: 28,
        style: {fontSize:'1rem', minHeight:'500px', lineHeight:'1.7', padding:'20px 24px'}
      }),
      el('div', {style:{display:'flex',gap:12,marginTop:16,alignItems:'center'}},
        el('button', {

          disabled: loading || !caseText.trim(),
        }, loading
          ? el('span', null, el('span',{className:'spinner'}), 'Thinking deeply about your case...')
          : 'Get Feedback'
        ),
        caseText.trim() && el('span', {style:{color:'#94a3b8',fontSize:'.82rem'}},
          caseText.split(/\s+/).length + ' words'
        )
      ),
      el(ErrorToast, {message: error, onDismiss: () => setError(null)})
    );
  }

  // Feedback view
  return el('div', {className:'panel panel-expanded'},
    el('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      el('span', {style:{color:'#fbbf24',fontWeight:700,fontSize:'.9rem',letterSpacing:'1px',textTransform:'uppercase'}}, 'Case Review — ' + comments.length + ' comments'),

        el('button', {className:'btn btn-ghost', onClick:() => {

          navigator.clipboard && navigator.clipboard.writeText(caseText);

          setActiveComment(null);
        }}, 'Re-analyze'),
        el('button', {className:'btn btn-ghost', onClick:() => {
          setCaseText('');
          setAnalyzed(false);
          setComments([]);
          setSegments([]);
          setActiveComment(null);
        }}, 'New Case')
      )
    ),
    el('div', {className:'fb-layout'},
      // Left: case text with highlights
      el('div', {className:'fb-case', ref:caseRef},
        segments.map((seg, i) =>
          seg.commentId
            ? el('span', {
                key: i,
                className: 'fb-highlight' + (activeComment === seg.commentId ? ' active' : ''),

      ),
      // Right: comments sidebar
      el('div', {className:'fb-sidebar'},
        el('div', {className:'fb-sidebar-header'}, 'Feedback'),
        el('div', {className:'fb-comments'},
          comments.map(c =>
            el('div', {key:c.id},
              el('div', {
                className: 'fb-comment' + (activeComment === c.id ? ' active' : ''),
                onClick: () => setActiveComment(activeComment === c.id ? null : c.id),
              },
                el('div', {className:'fb-comment-excerpt'}, '"' + c.excerpt.substring(0, 80) + (c.excerpt.length > 80 ? '...' : '') + '"'),

              c.replies.map((r, ri) =>

                  el('div', {style:{color: r.role === 'user' ? '#ef4444' : '#fbbf24', fontSize:'.75rem',fontWeight:600,marginBottom:2}},

              )

  );

function Judge() {
  const [format, setFormat] = useState('APDA');
  const [notes, setNotes] = useState({});
  const [tags, setTags] = useState({});
  const [feedback, setFeedback] = useState({});
  const [recording, setRecording] = useState(null); // speech code currently recording
  const recognitionRef = useRef(null);

  const speeches = FORMATS[format].speeches;

  const updateNote = (code, val) => setNotes(prev => ({...prev, [code]:val}));

  const toggleRecording = (code) => {
    if (recording === code) {
      // Stop recording
      if (recognitionRef.current) { recognitionRef.current.stop(); recognitionRef.current = null; }
      setRecording(null);
      return;
    }
    // Stop any existing recording first
    if (recognitionRef.current) { recognitionRef.current.stop(); recognitionRef.current = null; }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Speech recognition is not supported in this browser. Try Chrome.'); return; }

    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    let finalTranscript = '';
    recognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) { finalTranscript += t + ' '; }
        else { interim = t; }
      }
      setNotes(prev => {
        const base = (prev[code] || '').replace(/\n\[listening\.\.\.\].*$/, '');
        const combined = base + (base && !base.endsWith('\n') && finalTranscript ? '\n' : '') + finalTranscript + (interim ? '\n[listening...] ' + interim : '');
        return {...prev, [code]: combined};
      });
    };
    recognition.onerror = (e) => { if (e.error !== 'no-speech') { console.error('Speech error:', e.error); setRecording(null); } };
    recognition.onend = () => {
      // Clean up interim text
      setNotes(prev => {
        const cleaned = (prev[code] || '').replace(/\n\[listening\.\.\.\].*$/, '');
        return {...prev, [code]: cleaned};
      });
      if (recording === code) setRecording(null);
    };

    recognitionRef.current = recognition;
    recognition.start();
    setRecording(code);
  };
  const toggleTag = (code, tag) => {
    setTags(prev => {
      const current = prev[code] || [];
      return {...prev, [code]: current.includes(tag) ? current.filter(t=>t!==tag) : [...current, tag]};
    });
  };

  const [loadingFeedback, setLoadingFeedback] = useState({});

  const getFeedback = async (code) => {
    const speech = speeches.find(s=>s.code===code);
    const note = notes[code] || '';
    const speechTags = tags[code] || [];

    if (!note.trim()) return;
    setLoadingFeedback(prev => ({...prev, [code]:true}));
    try {
      const sysPrompt = `You are an experienced APDA judge providing deeply considered feedback on a debate speech. Think through the strategic implications of what the debater did and did not do. Analyze the speech's structure, warranting quality, strategic positioning, and how it interacts with likely opposition arguments. Be specific, reference debate theory (impact calculus, link chains, framework interaction, burden fulfillment, crystallization), and give actionable advice that would genuinely improve the debater's next round. Do not use markdown formatting — no **, no #, no *.`;
      const tagStr = speechTags.length > 0 ? `\nTagged moments: ${speechTags.join(', ')}` : '';
      const userPrompt = `Speech: ${speech.title} (${speech.code}, ${speech.time})\nFormat: ${format}${tagStr}\n\nMy flow notes:\n${note}\n\nGive me specific, strategic feedback on this speech.`;
      await callClaude(sysPrompt, userPrompt, (text) => {
        setFeedback(prev => ({...prev, [code]:text}));
      }, { thinkBudget: 6000, maxTokens: 6000 });
    } catch(e) {
      setFeedback(prev => ({...prev, [code]:'Error: '+e.message}));
    }
    setLoadingFeedback(prev => ({...prev, [code]:false}));
  };

  return React.createElement('div',{className:'panel'},
    speeches.map(speech =>
      React.createElement('div',{key:speech.code,className:'speech-card'},
        React.createElement('div',{className:'speech-header'},
          React.createElement('div',{style:{display:'flex',alignItems:'center'}},
            React.createElement('span',{className:'speech-badge'},speech.code),
            React.createElement('span',{className:'speech-title'},speech.title),
            React.createElement('span',{className:'speech-time'},'· '+speech.time),
          ),
          React.createElement('button',{
            className:'btn-record'+(recording===speech.code?' recording':''),
            onClick:()=>toggleRecording(speech.code),
            style: recording===speech.code ? {background:'#ef4444',color:'#fff'} : {}
          },
            recording===speech.code ? '\u23F9\uFE0F Stop' : '\uD83C\uDF99\uFE0F Record'
          )
        ),
        React.createElement('textarea',{
          placeholder:`Notes for ${speech.code}...`,
          value:notes[speech.code]||'',
          onChange:e=>updateNote(speech.code,e.target.value),
          rows:3
        }),
        React.createElement('div',{style:{display:'flex',alignItems:'center',flexWrap:'wrap',marginTop:10,gap:6}},
          JUDGE_TAGS.map(tag =>
            React.createElement('button',{
              key:tag,
              className:'tag'+((tags[speech.code]||[]).includes(tag)?' active':''),
              onClick:()=>toggleTag(speech.code,tag)
            },tag)
          ),
          React.createElement('button',{className:'feedback-btn',onClick:()=>getFeedback(speech.code)},'GET FEEDBACK')
        ),
        feedback[speech.code] && React.createElement('div',{
          style:{
            marginTop:12,padding:14,background:'#0f1724',
            borderRadius:8,border:'1px solid #ffffff08',
            fontSize:'.88rem',lineHeight:1.4,color:'#ccc',whiteSpace:'pre-line'
          }
        },cleanOutput(feedback[speech.code]))
      )
    )
  );
}

function buildJudgeFeedback(speech, note, activeTags) {
  if (!note.trim() && activeTags.length === 0) return 'Add notes or tag key moments to get specific feedback on this speech.';
  let fb = `Feedback for ${speech.title} (${speech.code}):\n\n`;
  if (activeTags.includes('STRONG WARRANT')) fb += '✓ Strong warranting noted — this will carry weight with the judge. Make sure the warrant connects clearly to the impact.\n\n';
  if (activeTags.includes('DROPPED ARG')) fb += '⚠ Dropped argument detected — this is a significant strategic issue. The other team can extend this in later speeches and claim it as conceded.\n\n';
  if (activeTags.includes('GOOD TURN')) fb += '✓ Good turn identified — turning an opponent\'s argument is one of the most powerful moves in debate. Make sure the turn is clean and the internal link is clear.\n\n';
  if (activeTags.includes('NEW IN REBUTTAL')) fb += '⚠ New argument in rebuttal — depending on the judge, this may be struck. It\'s generally better to seed responses earlier and crystallize in rebuttals rather than introduce entirely new material.\n\n';
  if (activeTags.includes('ASSERTION')) fb += '⚠ Assertion without warrant — this weakens the argument significantly. A good opponent will call this out. Every claim needs a "because" and a "which means."\n\n';
  if (activeTags.includes('KEY CLASH')) fb += '✓ Key clash point — this is where the round is likely decided. Both sides should be spending their most valuable speech time here.\n\n';
  if (note.trim()) fb += `Based on your notes: Focus on whether the speaker effectively extended their strongest arguments and responded to the most critical opposition points. ${speech.side === 'gov' || speech.side === 'og' ? 'As a government speaker, they should be defending the mechanism and weighing impacts.' : 'As an opposition speaker, they should be attacking the case at the link, impact, and uniqueness levels.'}`;
  return fb;
}

      el('p',{key:4,style:{fontWeight:600,color:'#e0e7ef'}},"Step 4: Build the skeleton. Three independent points."),
      el('p',{key:'4a'},"Jot down everything you want to say that supports your case statement. Then organize it into 2 to 3 distinct arguments. Each should be independent, meaning if opp beats one, the others still stand. Don't worry about full warrants yet. Just get the structure."),
      el('p',{key:5,style:{fontWeight:600,color:'#e0e7ef'}},"Step 5: Add depth. Claims, warrants, and impacts."),
      el('p',{key:'5a'},"Each point needs a claim (what you're arguing), warrants (why it's true, with specific reasoning), and an impact (what happens if the claim is true, and why it matters). You can pre-empt the opposition within your arguments. Decide which points carry the most weight for your collapse in PMR."),
      el('p',{key:6,style:{fontWeight:600,color:'#e0e7ef'}},"Step 6: Collaborate. Two heads are better than one."),
      el('p',{key:'6a'},"Work with your partner, your varsity, or a friend. Read them your case and listen to their reactions. They'll catch holes you missed. If your partner points out that addictive substances have inelastic demand and your case depends on price deterrence, now you know to scope your case differently. This back and forth is where cases get sharp."),
      el('p',{key:7,style:{fontWeight:600,color:'#e0e7ef'}},"Step 7: Write the tight block and plan your collapse."),
      el('p',{key:'7a'},"Think of 3 to 5 arguments opp will make and write your responses. This becomes your tight block for MG. Then plan your collapse: the single strongest argument or world-comparison that PMR will use to close the round. A good collapse often looks like \"in any version of this round, our impact still outweighs.\""),
      el('div',{key:'7b',className:'newbie-callout'}, el('span',null, el('strong',null,'Save your case in multiple places. '), 'Tournament wifi is unreliable and technology fails. Google Docs, a backup on your phone, and a printed copy if possible. You don\'t want to lose all that work.')),
    ]},
    { key:'jargon', icon:'\u{1F4AC}', title:'Core Jargon Decoded', render: () => [
      el('div',{key:0,className:'newbie-term'}, el('span',{className:'term-word'},'Framework'), el('span',{className:'term-def'},'The evaluative lens for the round. "Judge, here\'s HOW to decide who wins." Example: "Prioritize the most vulnerable stakeholders" or "evaluate based on which side produces more liberty."')),
      el('div',{key:1,className:'newbie-term'}, el('span',{className:'term-word'},'Warrant'), el('span',{className:'term-def'},'The reasoning behind a claim. "X is true BECAUSE Y, which leads to Z." The single most important concept in debate. Assertions without warrants don\'t count.')),
      el('div',{key:2,className:'newbie-term'}, el('span',{className:'term-word'},'Impact'), el('span',{className:'term-def'},'The "so what." Why does your argument matter? Impacts should be specific, measurable, and connected to human stakes.')),
      el('div',{key:3,className:'newbie-term'}, el('span',{className:'term-word'},'Weighing'), el('span',{className:'term-def'},'Comparing impacts across sides. "Even if you buy their X, our Y outweighs because it affects more people, is less reversible, and is more probable."')),
      el('div',{key:4,className:'newbie-term'}, el('span',{className:'term-word'},'Turn'), el('span',{className:'term-def'},'Taking an opponent\'s argument and showing it supports YOUR side. The most devastating move in debate.')),
      el('div',{key:5,className:'newbie-term'}, el('span',{className:'term-word'},'Drop'), el('span',{className:'term-def'},'When a team fails to respond to an argument. Treated as conceded. If you don\'t contest it, you agree with it.')),
      el('div',{key:6,className:'newbie-term'}, el('span',{className:'term-word'},'Link Chain'), el('span',{className:'term-def'},'Claim, then Warrant, then Impact. Example: "Private education exists, which creates segregated systems, which entrenches inequality across generations."')),
      el('div',{key:7,className:'newbie-term'}, el('span',{className:'term-word'},'Flow'), el('span',{className:'term-def'},'Notes the judge takes during the round, tracking arguments and responses across speeches. Also what debaters write during the round.')),
      el('div',{key:8,className:'newbie-term'}, el('span',{className:'term-word'},'Tight Block'), el('span',{className:'term-def'},'Pre-written responses to anticipated Opp arguments. Your defensive playbook, read at the start of MG.')),
      el('div',{key:9,className:'newbie-term'}, el('span',{className:'term-word'},'A2 (Answer To)'), el('span',{className:'term-def'},'Pre-prepared responses formatted as "A2: [their likely argument]" followed by your rebuttal.')),
      el('div',{key:10,className:'newbie-term'}, el('span',{className:'term-word'},'POC / POI / POO'), el('span',{className:'term-def'},'Point of Clarification (questions before round), Point of Information (interjection during speeches), Point of Order (claim that rebuttal has new arguments).')),
      el('div',{key:11,className:'newbie-term'}, el('span',{className:'term-word'},'RFD'), el('span',{className:'term-def'},'Reason for Decision. The judge\'s explanation of why they voted the way they did.')),
    ]},
    { key:'strategy', icon:'\u{1F9E0}', title:'Argument Strategy', render: () => [
      el('p',{key:0},'Your first instincts are often right, so go with them. Obvious arguments are often good and easy to make. Ask yourself: What is this motion trying to get at? Is there a problem the policy is attempting to solve? Who are the actors and what are their incentives? What does the other side look like?'),
      el('p',{key:1},'Think about the case on multiple levels: individual, community, demographic groups, local government, national government, international. Also think thematically \u2014 what norms does this set? What precedent does it create?'),
      el('p',{key:2},'Every argument should have a claim (what am I saying?), a warrant (why is this true?), an impact (what does this mean?), and weighing (why do you care?). Your goal is to make it easy for the judge to follow your logic to its conclusion.'),
      el('p',{key:3},"Weigh, weigh, and weigh some more. Make sure you've explained what makes your arguments important and why they're more important than the other side's. The most important argument is the one you're winning. Don't spend time resolving a clash you're losing when you can explain why the clash you're winning matters more."),
      el('div',{key:4,className:'newbie-callout'}, el('span',null, el('strong',null,'The hierarchy of winning: '), 'Frameworks (how to evaluate?) then Burdens (what must each side prove?) then Weighing (whose arguments matter more?) then Arguments (what will happen?) then Warrants (why will it happen?). Win at the highest level you can.')),
      el('p',{key:5},'Layer your responses. Beat the case at a high level, then beat the individual arguments, then beat the warrants. If the judge doesn\'t buy your response A, you still have responses B and C. But note: one good reason beats two or three bad reasons. Only add responses that actually help.'),
      el('p',{key:6},'Use "even if" generously. "Even if they win this argument, we still win because..." This shows the judge you can win even in the worst-case scenario. Take the other team at their best and beat them anyway.'),
    ]},
    { key:'nib', icon:'\u2696\uFE0F', title:'Necessary but Insufficient Burdens (NIB)', render: () => [
      el('p',{key:0},"A Necessary but Insufficient Burden (NIB) is one of the most important and least understood concepts on APDA. Understanding NIBs will immediately make you a more strategic debater and help you recognize when an argument sounds convincing but isn't actually doing the work to win the round."),
      el('p',{key:1,style:{fontWeight:600,color:'#e0e7ef'}},"What is a NIB?"),
      el('p',{key:2},"A necessary but insufficient burden is a condition that MUST be true for a side to win, but that alone is NOT ENOUGH to win. Think of it like a key that opens a door: you need the key to get through, but having the key doesn't mean you should walk through the door. The key is necessary but insufficient."),
      el('p',{key:3,style:{fontWeight:600,color:'#e0e7ef'}},"A concrete example:"),
      el('p',{key:4},"Imagine the motion is \"THW legalize all drugs.\" Government argues that the War on Drugs has failed (mass incarceration, cartels still thrive, etc.). Opp might respond: \"Even if the War on Drugs has failed, that doesn't mean full legalization is the answer. Maybe decriminalization, or targeted reform, or better enforcement would fix the problems without the risks of full legalization.\" What Gov proved (the War on Drugs failed) is a NIB: it's necessary for their case to work (if the current system were fine, there'd be no reason to change), but it's insufficient to prove that their specific proposal is the right fix."),
      el('div',{key:5,className:'newbie-callout'}, el('span',null, el('strong',null,'The NIB test: '), 'Ask yourself: "If this argument is true, does Gov/Opp automatically win?" If the answer is no, if there are still other things they need to prove, then the argument is a NIB. It helps their case but it doesn\'t close the deal.')),
      el('p',{key:6,style:{fontWeight:600,color:'#e0e7ef'}},"How NIBs show up in rounds:"),
      el('p',{key:7},"\"There is a problem\" is almost always a NIB. Proving a problem exists doesn't prove your solution is the right one. \"The status quo is bad\" is a NIB. It doesn't mean the alternative is better. \"X has happened before\" is a NIB. Historical precedent doesn't guarantee future outcomes. \"People care about this\" is a NIB. Caring about something doesn't tell you which direction to go."),
      el('p',{key:8,style:{fontWeight:600,color:'#e0e7ef'}},"How to use NIBs strategically:"),
      el('p',{key:9},"On Gov: Make sure your case doesn't stop at NIBs. If your first argument proves the problem exists, your second argument needs to prove your solution works, and your third needs to prove it's better than alternatives. Don't spend your whole case establishing something that's necessary but not sufficient."),
      el('p',{key:10},"On Opp: Identifying an opponent's argument as a NIB is devastating. You can say: \"Even if everything they said in their first argument is true, they still haven't proven their case. They showed the problem exists. Great. We agree. But they haven't shown that their solution fixes it, or that it doesn't create worse problems.\" This lets you concede ground without losing anything, because you're showing the judge that the ground you conceded doesn't actually matter."),
      el('p',{key:11},"On judging: Judges love when debaters understand NIBs because it shows strategic maturity. A debater who can say \"that's necessary but insufficient for their case\" demonstrates a level of analytical clarity that scores well on speaker points."),
      el('div',{key:12,className:'newbie-callout'}, el('span',null, el('strong',null,'Common NIB traps for new debaters: '), 'Spending 5 minutes of your PMC proving the problem exists, then only 2 minutes on your actual solution. This is called \"proving the NIB\" and it means you\'ve spent most of your speech on something that doesn\'t win you the round by itself. Flip the ratio: establish the problem quickly, then spend your time on why your solution is uniquely good.')),
    ]},
    { key:'speaks', icon:'\u{1F399}', title:'Improving Your Speaks', render: () => [
      el('p',{key:0},"Clearer delivery, not just more style, makes it easier for the judge to follow you. Signpost your arguments: \"Our first independent argument is...\", \"There are three warrants...\", \"This is important because...\" Number your points so the judge can flow them cleanly."),
      el('p',{key:1},"Have good flow coverage. Respond to everything at a high level at minimum. You don't need to beat every individual warrant if you've already beaten the claim or the impact, but you should acknowledge it."),
      el('p',{key:2},"Do picture painting. Give concrete examples that characterize how people actually behave. Abstract arguments are harder for judges to weigh than vivid, specific ones."),
      el('p',{key:3},"Say your questions out loud: \"Why is this true? Why does this matter? Why is this relevant?\" This helps you figure out what to say next and sets up what the judge should be thinking. Time yourself. New debaters always run out of time. Practice a 7-minute speech at home until you feel the pacing."),

    { key:'advanced', icon:'\u{1F4DA}', title:'Advanced Vocabulary', render: () => [

      el('div',{key:1,className:'newbie-term'}, el('span',{className:'term-word'},'Counterfactual'), el('span',{className:'term-def'},'The world where the opposite happened. "What\'s the counterfactual?" = "if we DON\'T do this, what happens instead?"')),
      el('div',{key:2,className:'newbie-term'}, el('span',{className:'term-word'},'Structural'), el('span',{className:'term-def'},'Built into the system, not accidental. Implies individual solutions are insufficient.')),
      el('div',{key:3,className:'newbie-term'}, el('span',{className:'term-word'},'Solvency'), el('span',{className:'term-def'},'Whether the plan actually fixes the problem. "They have no solvency" = mechanism doesn\'t connect to impact.')),
      el('div',{key:4,className:'newbie-term'}, el('span',{className:'term-word'},'Uniqueness'), el('span',{className:'term-def'},'Whether the harm is unique to status quo. If it exists in both worlds, it shouldn\'t count for either side.')),
      el('div',{key:5,className:'newbie-term'}, el('span',{className:'term-word'},'Bright Line'), el('span',{className:'term-def'},'A clear threshold. "Where do you draw the bright line?" challenges vague proposals.')),
      el('div',{key:6,className:'newbie-term'}, el('span',{className:'term-word'},'Externality'), el('span',{className:'term-def'},'A cost or benefit that falls on someone who didn\'t choose to participate. Pollution = negative externality.')),
      el('div',{key:7,className:'newbie-term'}, el('span',{className:'term-word'},'Moral Hazard'), el('span',{className:'term-def'},'When insulating someone from consequences makes them take bigger risks. Bailouts, insurance.')),
      el('div',{key:8,className:'newbie-term'}, el('span',{className:'term-word'},'Substitution Effect'), el('span',{className:'term-def'},'Making one thing harder pushes people to alternatives. Devastates simplistic ban cases.')),
      el('div',{key:9,className:'newbie-term'}, el('span',{className:'term-word'},'Chilling Effect'), el('span',{className:'term-def'},'A rule discourages more behavior than intended because people fear crossing the line.')),

      el('div',{key:11,className:'newbie-term'}, el('span',{className:'term-word'},'Path Dependent'), el('span',{className:'term-def'},'Where you end up depends on where you started. Early failures compound.')),
      el('div',{key:12,className:'newbie-term'}, el('span',{className:'term-word'},'Epistemic'), el('span',{className:'term-def'},'Related to knowledge. "Epistemic problem" = we can\'t reliably know the thing being claimed.')),
      el('div',{key:13,className:'newbie-term'}, el('span',{className:'term-word'},'Normative'), el('span',{className:'term-def'},'About what SHOULD be, not what IS. Distinguishes values claims from empirical claims.')),
      el('div',{key:14,className:'newbie-term'}, el('span',{className:'term-word'},'Rent-Seeking'), el('span',{className:'term-def'},'Using political power to capture wealth without creating value. Explains why actors resist reform.')),
      el('div',{key:15,className:'newbie-term'}, el('span',{className:'term-word'},'Hegemonic'), el('span',{className:'term-def'},'Dominant in a way that shapes what seems normal. The story everyone accepts without questioning.')),
      el('div',{key:16,className:'newbie-term'}, el('span',{className:'term-word'},'Praxis'), el('span',{className:'term-def'},'Putting theory into action. "What does this look like in praxis?" = how does this work in the real world?')),
    ]},
    { key:'lingo', icon:'\u{1F5E3}', title:'Out-of-Round Lingo', render: () => [
      el('p',{key:0},"If you hear a term you don't understand, ask. Everyone learned these at some point and there's no shame in asking."),
      el('div',{key:1,className:'newbie-term'}, el('span',{className:'term-word'},'Pro-Am'), el('span',{className:'term-def'},'A team with one varsity and one novice member.')),
      el('div',{key:2,className:'newbie-term'}, el('span',{className:'term-word'},'Hybrid'), el('span',{className:'term-def'},'Partnering with someone from a different school.')),

      el('div',{key:9,className:'newbie-term'}, el('span',{className:'term-word'},'CAs'), el('span',{className:'term-def'},'Chief Adjudicators. They write the motions for motions rounds.')),

    { key:'tips', icon:'\u{1F680}', title:'Tips for Getting Started', render: () => [
      el('p',{key:0},"Read the news every day. Not just headlines. Understand WHY things are happening. Debate rewards people who can connect current events to structural arguments."),
      el('p',{key:1},"Learn 3 or 4 philosophical frameworks well. Utilitarianism, Rawlsian justice, Kantian ethics, and one critical theory framework (Marx, Foucault, or feminist theory) covers about 80% of what you'll encounter."),
      el('p',{key:2},'Always have a warrant. The biggest novice mistake is asserting without explaining. "Climate change is bad" is an assertion. "Climate change is bad because rising sea levels will displace 200 million coastal residents by 2050" is a warranted argument.'),
      el('p',{key:3},"Listen more than you talk in prep. Your partner might see an angle you missed. The best teams are collaborative, not hierarchical."),
      el('p',{key:4},"Don't try to win every argument. Try to win the round. Conceding a small point strategically is often more powerful than fighting over everything."),

  return el('div',{className:'panel'},

        ),

    el('div',{className:'newbie-section',style:{marginTop:32}},
      el('div',{className:'newbie-section-header'+(expanded['whysmart']?' open':''),onClick:()=>toggle('whysmart')},
        el('span',{className:'newbie-section-icon'},'\u{1F4A1}'),
        el('h3',null,'Why Debate Makes You Smarter'),
        el('span',{className:'arrow'+(expanded['whysmart']?' open':'')},'\u25BC')
      ),
      expanded['whysmart'] && el('div',{className:'newbie-section-body'},
        el('p',{key:0},"Debate isn't just an extracurricular. It rewires how you think. Research in cognitive science shows that arguing both sides of an issue forces your brain to hold competing models simultaneously, which is the foundation of critical thinking. You stop accepting claims at face value because you've trained yourself to immediately ask \"what would the other side say?\""),
        el('p',{key:1},"Debaters consistently outperform non-debaters on measures of analytical reasoning, reading comprehension, and persuasive writing. A 2015 study at the University of Vermont found that students who participated in competitive debate scored significantly higher on critical thinking assessments than matched peers. This isn't surprising: every round is a live exercise in constructing arguments, identifying logical gaps, and synthesizing information under time pressure."),
        el('p',{key:2},"Beyond academics, debate teaches you to speak clearly under pressure, structure your thoughts on the fly, and listen actively. These are skills that transfer directly to job interviews, negotiations, presentations, and everyday conversations. The confidence you build from standing up and defending an idea in front of a judge doesn't go away when you leave the tournament."),
        el('p',{key:3},"Perhaps most importantly, debate teaches intellectual humility. When you're forced to argue for positions you disagree with, you start to understand why smart people can look at the same evidence and reach different conclusions. That kind of empathy and nuance is rare and valuable.")
      )

        el('p',{key:0},"No. And we want to be transparent about that."),
        el('p',{key:1},"DebateOS uses Claude, a large language model, to generate cases, feedback, and strategic analysis. It's good at synthesizing information, structuring arguments, and covering a lot of ground quickly. But it has real limits that any experienced debater will notice."),
        el('p',{key:2},"The AI can't read a room. It doesn't know what your judge thinks is important, what your opponent's tendencies are, or when to abandon a losing argument and pivot. It doesn't feel the energy of a round or adjust its strategy based on a raised eyebrow from the judge. These are things that only come from hundreds of hours of live debate."),
        el('p',{key:3},"AI-generated cases also tend toward a certain sameness. Even with all our prompt engineering to make output sound more human, a Nationals-caliber debater will write cases with a creativity, specificity, and strategic depth that AI struggles to match. The best cases come from personal experience, niche knowledge, and genuine passion for an argument. AI doesn't have those."),
        el('p',{key:4},"Think of DebateOS as a training partner, not a replacement for the real thing. It can help you brainstorm, pressure-test your arguments, and learn debate concepts faster. But the growth that matters happens in actual rounds, with real partners, against real opponents. The AI gets you ready. The rounds make you good.")

let firebaseApp, firebaseAuth, firebaseDb;
try {
  if (typeof firebase !== 'undefined' && FIREBASE_CONFIG.apiKey !== 'YOUR_FIREBASE_API_KEY') {
    firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
    firebaseAuth = firebase.auth();
    firebaseDb = firebase.firestore();
  }
} catch(e) { console.warn('Firebase init skipped:', e.message); }

function useAuth() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!firebaseAuth) { setLoading(false); return; }
    return firebaseAuth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
  }, []);
  const signIn = async () => {
    if (!firebaseAuth) return alert('Firebase not configured yet. Add your Firebase config to enable profiles and the forum.');
    const provider = new firebase.auth.GoogleAuthProvider();
    await firebaseAuth.signInWithPopup(provider);
  };
  const signOut = async () => { if (firebaseAuth) await firebaseAuth.signOut(); };
  return { user, loading, signIn, signOut };
}

function ErrorToast({ message, onDismiss }) {
  if (!message) return null;
  let title = 'Something went wrong';
  let detail = message;
  if (message.includes('Rate limited')) { title = 'Slow down'; }
  else if (message.includes('Authentication')) { title = 'Auth error'; }
  else if (message.includes('temporarily down')) { title = 'Service unavailable'; }
  else if (message.includes('offline')) { title = 'No connection'; }
  else if (message.includes('Failed to fetch')) { title = 'Connection failed'; detail = 'Could not reach the AI service. Check your internet connection and try again.'; }
  return React.createElement('div', {className:'error-toast'},
    React.createElement('span', {className:'error-toast-icon'}, '\u26A0\uFE0F'),
    React.createElement('div', {className:'error-toast-body'},
      React.createElement('div', {className:'error-toast-title'}, title),
      React.createElement('div', {className:'error-toast-detail'}, detail),
    ),
    React.createElement('button', {className:'error-toast-dismiss', onClick:onDismiss}, '\u2715'),
  );
}
