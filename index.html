function CaseFeedback() {
  const el = React.createElement;
  const [caseText, setCaseText] = useState('');
  const [analyzed, setAnalyzed] = useState(false);
  const [loading, setLoading] = useState(false);
  const [comments, setComments] = useState([]); // [{id, excerpt, startIdx, endIdx, feedback, replies:[]}]
  const [segments, setSegments] = useState([]); // [{text, commentId?}]
  const [activeComment, setActiveComment] = useState(null);
  const [replyText, setReplyText] = useState('');
  const [revising, setRevising] = useState(false);
  const caseRef = useRef(null);

  const [error, setError] = useState('');

  const analyze = async () => {
    if (!caseText.trim()) return;
    setError('');
    setLoading(true);
    setComments([]);
    setSegments([]);
    setActiveComment(null);

    const sysPrompt = `You are an expert APDA debate coach reviewing a case. Analyze this case and identify 5-8 specific sections that need feedback. For each section, select the EXACT text from the case (10-60 words, must be a verbatim substring) and provide specific, actionable coaching feedback.

Think deeply about: argument structure and warrant quality, framework defensibility, link chain strength, vulnerability to opposition attacks, strategic positioning, background effectiveness, and overall persuasiveness.

Return ONLY valid JSON in this exact format — no text before or after:
[
  {"excerpt": "exact verbatim text from the case", "feedback": "specific coaching feedback for this section"},
  ...
]

Rules:
- Each excerpt must be an EXACT substring of the case text (verbatim, including punctuation)
- Feedback should be specific and strategic, not vague ("this argument lacks a warrant connecting X to Y" not "needs improvement")
- Cover different aspects: some about content, some about strategy, some about framing
- Order them by their position in the case (first excerpt appears earliest in the text)
- Do not use markdown formatting in feedback`;

    try {
      let result = '';
      await callClaude(sysPrompt, `Here is the case to review:\n\n${caseText}`, (text) => {
        result = text;
      }, { thinkBudget: 10000, maxTokens: 16000 });

      // Parse JSON from response
      const jsonMatch = result.match(/\[[\s\S]*\]/);
      if (!jsonMatch) throw new Error('Invalid response format');
      const parsed = JSON.parse(jsonMatch[0]);

      // Build comments with positions
      const newComments = [];
      parsed.forEach((item, i) => {
        const idx = caseText.indexOf(item.excerpt);
        if (idx !== -1) {
          newComments.push({
            id: 'c' + i,
            excerpt: item.excerpt,
            startIdx: idx,
            endIdx: idx + item.excerpt.length,
            feedback: item.feedback,
            replies: [],
          });
        }
      });

      // Sort by position
      newComments.sort((a, b) => a.startIdx - b.startIdx);

      // Build segments for rendering
      const segs = [];
      let cursor = 0;
      newComments.forEach(c => {
        if (c.startIdx > cursor) {
          segs.push({ text: caseText.substring(cursor, c.startIdx) });
        }
        segs.push({ text: caseText.substring(c.startIdx, c.endIdx), commentId: c.id });
        cursor = c.endIdx;
      });
      if (cursor < caseText.length) {
        segs.push({ text: caseText.substring(cursor) });
      }

      setComments(newComments);
      setSegments(segs);
      setAnalyzed(true);
    } catch(e) {
      setError('Error analyzing case: ' + e.message);
      setAnalyzed(false);
    }
    setLoading(false);
  };

  const handleReply = async (commentId) => {
    if (!replyText.trim() || revising) return;
    const comment = comments.find(c => c.id === commentId);
    if (!comment) return;

    setRevising(true);
    const userReply = replyText.trim();
    setReplyText('');

    // Add user reply to comment
    setComments(prev => prev.map(c => c.id === commentId
      ? {...c, replies: [...c.replies, {role:'user', text:userReply}]}
      : c
    ));

    try {
      const sysPrompt = `You are an expert APDA debate case editor. The user has a specific section of their debate case that received feedback. They are now replying with instructions for how to improve it. Rewrite ONLY the highlighted section based on their instruction. Maintain the same style, tone, and format as the surrounding case. Return ONLY the rewritten text — nothing else. Do not use markdown formatting.`;
      const userPrompt = `Full case for context:\n\n${caseText}\n\n---\nSection to revise:\n"${comment.excerpt}"\n\nOriginal feedback: ${comment.feedback}\n\nUser's instruction: ${userReply}\n\nRewrite this section:`;

      let revised = '';
      await callClaude(sysPrompt, userPrompt, (text) => {
        revised = text;
      }, { thinkBudget: 6000, maxTokens: 4000 });

      // Apply the revision
      const newCaseText = caseText.substring(0, comment.startIdx) + revised + caseText.substring(comment.endIdx);
      setCaseText(newCaseText);

      // Add AI reply
      setComments(prev => prev.map(c => c.id === commentId
        ? {...c, replies: [...c.replies, {role:'ai', text:'Section revised. Re-analyze to see updated feedback.'}], excerpt: revised, endIdx: comment.startIdx + revised.length}
        : c
      ));

      // Re-segment with updated text
      const newSegs = [];
      let cursor = 0;
      const updatedComments = comments.map(c => c.id === commentId
        ? {...c, excerpt: revised, endIdx: comment.startIdx + revised.length}
        : c
      );
      updatedComments.forEach(c => {
        if (c.startIdx > cursor) {
          newSegs.push({ text: newCaseText.substring(cursor, c.startIdx) });
        }
        newSegs.push({ text: newCaseText.substring(c.startIdx, c.startIdx + c.excerpt.length), commentId: c.id });
        cursor = c.startIdx + c.excerpt.length;
      });
      if (cursor < newCaseText.length) {
        newSegs.push({ text: newCaseText.substring(cursor) });
      }
      setSegments(newSegs);

    } catch(e) {
      setComments(prev => prev.map(c => c.id === commentId
        ? {...c, replies: [...c.replies, {role:'ai', text:'Error: ' + e.message}]}
        : c
      ));
    }
    setRevising(false);
  };

  // Input view
  if (!analyzed) {
    return el('div', {className:'panel'},
      el('label', {className:'field-label'}, 'Paste Your Case'),
      el('textarea', {
        value: caseText,
        onChange: e => setCaseText(e.target.value),
        placeholder: 'Paste your full debate case here — background, framework, arguments, everything. The AI will analyze it and give you targeted, section-by-section feedback...',
        rows: 24,
        style: {fontSize:'.95rem', minHeight:'340px'}
      }),
      el('div', {style:{display:'flex',gap:12,marginTop:16,alignItems:'center'}},
        el('button', {
          className: 'btn btn-green',
          onClick: analyze,
          disabled: loading || !caseText.trim(),
        }, loading
          ? el('span', null, el('span',{className:'spinner'}), 'Thinking deeply about your case...')
          : 'Get Feedback'
        ),
        caseText.trim() && el('span', {style:{color:'#94a3b8',fontSize:'.82rem'}},
          caseText.split(/\s+/).length + ' words'
        )
      ),
      el(ErrorToast, {message: error, onDismiss: () => setError(null)})
    );
  }

  // Feedback view
  return el('div', {className:'panel panel-expanded'},
    el('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      el('span', {style:{color:'#fbbf24',fontWeight:700,fontSize:'.9rem',letterSpacing:'1px',textTransform:'uppercase'}}, 'Case Review — ' + comments.length + ' comments'),
      el('div', {style:{display:'flex',gap:10}},
        el('button', {className:'btn btn-ghost', onClick:() => {
          // Copy current case text
          navigator.clipboard && navigator.clipboard.writeText(caseText);
        }}, 'Copy Case'),
        el('button', {className:'btn btn-ghost', onClick:() => {
          setAnalyzed(false);
          setComments([]);
          setSegments([]);
          setActiveComment(null);
        }}, 'Re-analyze'),
        el('button', {className:'btn btn-ghost', onClick:() => {
          setCaseText('');
          setAnalyzed(false);
          setComments([]);
          setSegments([]);
          setActiveComment(null);
        }}, 'New Case')
      )
    ),
    el('div', {className:'fb-layout'},
      // Left: case text with highlights
      el('div', {className:'fb-case', ref:caseRef},
        segments.map((seg, i) =>
          seg.commentId
            ? el('span', {
                key: i,
                className: 'fb-highlight' + (activeComment === seg.commentId ? ' active' : ''),
                onClick: () => setActiveComment(seg.commentId),
                'data-comment': seg.commentId,
              }, seg.text)
            : el('span', {key:i}, seg.text)
        )
      ),
      // Right: comments sidebar
      el('div', {className:'fb-sidebar'},
        el('div', {className:'fb-sidebar-header'}, 'Feedback'),
        el('div', {className:'fb-comments'},
          comments.map(c =>
            el('div', {key:c.id},
              el('div', {
                className: 'fb-comment' + (activeComment === c.id ? ' active' : ''),
                onClick: () => setActiveComment(activeComment === c.id ? null : c.id),
              },
                el('div', {className:'fb-comment-excerpt'}, '"' + c.excerpt.substring(0, 80) + (c.excerpt.length > 80 ? '...' : '') + '"'),
                el('div', {className:'fb-comment-text'}, c.feedback)
              ),
              // Replies
              c.replies.map((r, ri) =>
                el('div', {key:ri, className: r.role === 'user' ? 'fb-comment' : 'fb-reply-ai', style:{marginLeft:12,marginTop:4}},
                  el('div', {style:{color: r.role === 'user' ? '#5eead4' : '#fbbf24', fontSize:'.75rem',fontWeight:600,marginBottom:2}},
                    r.role === 'user' ? 'You' : 'DebateOS'
                  ),
                  r.text
                )
              ),
              // Reply input when active
              activeComment === c.id && el('div', {className:'fb-reply-box'},
                el('textarea', {
                  value: replyText,
                  onChange: e => setReplyText(e.target.value),
                  placeholder: 'Reply with revision instructions (e.g. "strengthen the warrant here" or "add a specific example")...',
                  onKeyDown: e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleReply(c.id); } }
                }),
                el('button', {
                  className: 'btn btn-green',
                  onClick: () => handleReply(c.id),
                  disabled: revising || !replyText.trim(),
                }, revising ? el('span',null,el('span',{className:'spinner'}),'Revising...') : 'Revise Section')
              )
            )
          )
        )
      )
    )
  );
}

function Judge() {
  const [format, setFormat] = useState('APDA');
  const [notes, setNotes] = useState({});
  const [tags, setTags] = useState({});
  const [feedback, setFeedback] = useState({});
  const [recording, setRecording] = useState(null); // speech code currently recording
  const recognitionRef = useRef(null);

  const speeches = FORMATS[format].speeches;

  const updateNote = (code, val) => setNotes(prev => ({...prev, [code]:val}));

  const toggleRecording = (code) => {
    if (recording === code) {
      // Stop recording
      if (recognitionRef.current) { recognitionRef.current.stop(); recognitionRef.current = null; }
      setRecording(null);
      return;
    }
    // Stop any existing recording first
    if (recognitionRef.current) { recognitionRef.current.stop(); recognitionRef.current = null; }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Speech recognition is not supported in this browser. Try Chrome.'); return; }

    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    let finalTranscript = '';
    recognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) { finalTranscript += t + ' '; }
        else { interim = t; }
      }
      setNotes(prev => {
        const base = (prev[code] || '').replace(/\n\[listening\.\.\.\].*$/, '');
        const combined = base + (base && !base.endsWith('\n') && finalTranscript ? '\n' : '') + finalTranscript + (interim ? '\n[listening...] ' + interim : '');
        return {...prev, [code]: combined};
      });
    };
    recognition.onerror = (e) => { if (e.error !== 'no-speech') { console.error('Speech error:', e.error); setRecording(null); } };
    recognition.onend = () => {
      // Clean up interim text
      setNotes(prev => {
        const cleaned = (prev[code] || '').replace(/\n\[listening\.\.\.\].*$/, '');
        return {...prev, [code]: cleaned};
      });
      if (recording === code) setRecording(null);
    };

    recognitionRef.current = recognition;
    recognition.start();
    setRecording(code);
  };
  const toggleTag = (code, tag) => {
    setTags(prev => {
      const current = prev[code] || [];
      return {...prev, [code]: current.includes(tag) ? current.filter(t=>t!==tag) : [...current, tag]};
    });
  };

  const [loadingFeedback, setLoadingFeedback] = useState({});

  const getFeedback = async (code) => {
    const speech = speeches.find(s=>s.code===code);
    const note = notes[code] || '';
    const speechTags = tags[code] || [];

    if (!note.trim()) return;
    setLoadingFeedback(prev => ({...prev, [code]:true}));
    try {
      const sysPrompt = `You are an experienced APDA judge providing deeply considered feedback on a debate speech. Think through the strategic implications of what the debater did and did not do. Analyze the speech's structure, warranting quality, strategic positioning, and how it interacts with likely opposition arguments. Be specific, reference debate theory (impact calculus, link chains, framework interaction, burden fulfillment, crystallization), and give actionable advice that would genuinely improve the debater's next round. Do not use markdown formatting — no **, no #, no *.`;
      const tagStr = speechTags.length > 0 ? `\nTagged moments: ${speechTags.join(', ')}` : '';
      const userPrompt = `Speech: ${speech.title} (${speech.code}, ${speech.time})\nFormat: ${format}${tagStr}\n\nMy flow notes:\n${note}\n\nGive me specific, strategic feedback on this speech.`;
      await callClaude(sysPrompt, userPrompt, (text) => {
        setFeedback(prev => ({...prev, [code]:text}));
      }, { thinkBudget: 6000, maxTokens: 6000 });
    } catch(e) {
      setFeedback(prev => ({...prev, [code]:'Error: '+e.message}));
    }
    setLoadingFeedback(prev => ({...prev, [code]:false}));
  };

  return React.createElement('div',{className:'panel'},
    React.createElement('label',{className:'field-label green'},'Format'),
    React.createElement('select',{
      value:format,
      onChange:e=>{setFormat(e.target.value);setNotes({});setTags({});setFeedback({})},
      style:{marginBottom:20}
    },
      Object.entries(FORMATS).map(([k,v])=>React.createElement('option',{key:k,value:k},v.label))
    ),
    speeches.map(speech =>
      React.createElement('div',{key:speech.code,className:'speech-card'},
        React.createElement('div',{className:'speech-header'},
          React.createElement('div',{style:{display:'flex',alignItems:'center'}},
            React.createElement('span',{className:'speech-badge'},speech.code),
            React.createElement('span',{className:'speech-title'},speech.title),
            React.createElement('span',{className:'speech-time'},'· '+speech.time),
          ),
          React.createElement('button',{
            className:'btn-record'+(recording===speech.code?' recording':''),
            onClick:()=>toggleRecording(speech.code),
            style: recording===speech.code ? {background:'#ef4444',color:'#fff'} : {}
          },
            recording===speech.code ? '\u23F9\uFE0F Stop' : '\uD83C\uDF99\uFE0F Record'
          )
        ),
        React.createElement('textarea',{
          placeholder:`Notes for ${speech.code}...`,
          value:notes[speech.code]||'',
          onChange:e=>updateNote(speech.code,e.target.value),
          rows:3
        }),
        React.createElement('div',{style:{display:'flex',alignItems:'center',flexWrap:'wrap',marginTop:10,gap:6}},
          JUDGE_TAGS.map(tag =>
            React.createElement('button',{
              key:tag,
              className:'tag'+((tags[speech.code]||[]).includes(tag)?' active':''),
              onClick:()=>toggleTag(speech.code,tag)
            },tag)
          ),
          React.createElement('button',{className:'feedback-btn',onClick:()=>getFeedback(speech.code)},'GET FEEDBACK')
        ),
        feedback[speech.code] && React.createElement('div',{
          style:{
            marginTop:12,padding:14,background:'#0f1724',
            borderRadius:8,border:'1px solid #ffffff08',
            fontSize:'.88rem',lineHeight:1.4,color:'#ccc',whiteSpace:'pre-line'
          }
        },cleanOutput(feedback[speech.code]))
      )
    )
  );
}

function buildJudgeFeedback(speech, note, activeTags) {
  if (!note.trim() && activeTags.length === 0) return 'Add notes or tag key moments to get specific feedback on this speech.';
  let fb = `Feedback for ${speech.title} (${speech.code}):\n\n`;
  if (activeTags.includes('STRONG WARRANT')) fb += '✓ Strong warranting noted — this will carry weight with the judge. Make sure the warrant connects clearly to the impact.\n\n';
  if (activeTags.includes('DROPPED ARG')) fb += '⚠ Dropped argument detected — this is a significant strategic issue. The other team can extend this in later speeches and claim it as conceded.\n\n';
  if (activeTags.includes('GOOD TURN')) fb += '✓ Good turn identified — turning an opponent\'s argument is one of the most powerful moves in debate. Make sure the turn is clean and the internal link is clear.\n\n';
  if (activeTags.includes('NEW IN REBUTTAL')) fb += '⚠ New argument in rebuttal — depending on the judge, this may be struck. It\'s generally better to seed responses earlier and crystallize in rebuttals rather than introduce entirely new material.\n\n';
  if (activeTags.includes('ASSERTION')) fb += '⚠ Assertion without warrant — this weakens the argument significantly. A good opponent will call this out. Every claim needs a "because" and a "which means."\n\n';
  if (activeTags.includes('KEY CLASH')) fb += '✓ Key clash point — this is where the round is likely decided. Both sides should be spending their most valuable speech time here.\n\n';
  if (note.trim()) fb += `Based on your notes: Focus on whether the speaker effectively extended their strongest arguments and responded to the most critical opposition points. ${speech.side === 'gov' || speech.side === 'og' ? 'As a government speaker, they should be defending the mechanism and weighing impacts.' : 'As an opposition speaker, they should be attacking the case at the link, impact, and uniqueness levels.'}`;
  return fb;
}

function Newbies() {
  const [expanded, setExpanded] = useState({});
  const toggle = (key) => setExpanded(prev => ({...prev, [key]:!prev[key]}));

  const el = React.createElement;

  const sections = [
    { key:'what', icon:'\u{1F3DB}', title:'What Is Parliamentary Debate?', render: () => [
      el('p',{key:0},"Parliamentary debate is a structured format where two teams argue for and against a resolution. One team (Government) proposes and defends a position; the other (Opposition) challenges it."),
      el('p',{key:1},"In APDA (American Parliamentary Debate Association), the most common college format, it's 2v2. Government has a Prime Minister (PM) and Member of Government (MG). Opposition has a Leader of Opposition (LO) and Member of Opposition (MO). There are six speeches total, alternating sides."),

let firebaseApp, firebaseAuth, firebaseDb;
try {
  if (typeof firebase !== 'undefined' && FIREBASE_CONFIG.apiKey !== 'YOUR_FIREBASE_API_KEY') {
    firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
    firebaseAuth = firebase.auth();
    firebaseDb = firebase.firestore();

function useAuth() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!firebaseAuth) { setLoading(false); return; }
    return firebaseAuth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
  }, []);
  const signIn = async () => {
    if (!firebaseAuth) return alert('Firebase not configured yet. Add your Firebase config to enable profiles and the forum.');
    const provider = new firebase.auth.GoogleAuthProvider();
    await firebaseAuth.signInWithPopup(provider);
  };
  const signOut = async () => { if (firebaseAuth) await firebaseAuth.signOut(); };
  return { user, loading, signIn, signOut };
}

/* ═══════════════════════════════════════════════════
   ERROR TOAST COMPONENT
   ═══════════════════════════════════════════════════ */

function ErrorToast({ message, onDismiss }) {
  if (!message) return null;
  let title = 'Something went wrong';
  let detail = message;
  if (message.includes('Rate limited')) { title = 'Slow down'; }
  else if (message.includes('Authentication')) { title = 'Auth error'; }
  else if (message.includes('temporarily down')) { title = 'Service unavailable'; }
  else if (message.includes('offline')) { title = 'No connection'; }
  else if (message.includes('Failed to fetch')) { title = 'Connection failed'; detail = 'Could not reach the AI service. Check your internet connection and try again.'; }
  return React.createElement('div', {className:'error-toast'},
    React.createElement('span', {className:'error-toast-icon'}, '\u26A0\uFE0F'),
    React.createElement('div', {className:'error-toast-body'},
      React.createElement('div', {className:'error-toast-title'}, title),
      React.createElement('div', {className:'error-toast-detail'}, detail),
    ),
    React.createElement('button', {className:'error-toast-dismiss', onClick:onDismiss}, '\u2715'),
  );
}

/* ═══════════════════════════════════════════════════
   AUTH MODAL
   ═══════════════════════════════════════════════════ */

function AuthModal({ onSignIn, onSkip }) {
  return React.createElement('div', {className:'auth-overlay'},
    React.createElement('div', {className:'auth-modal'},
      React.createElement('h2', null, 'Welcome to DebateOS'),
      React.createElement('p', null, 'Sign in to save your profile and share cases in the forum. You can skip this and use the app without an account.'),
      React.createElement('button', {className:'auth-google-btn', onClick:onSignIn},
        React.createElement('img', {src:'https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg', width:20, height:20}),
        'Sign in with Google'
      ),
      React.createElement('button', {className:'auth-skip', onClick:onSkip}, 'Skip for now'),
    )
  );
}

/* ═══════════════════════════════════════════════════
   FORUM COMPONENT
   ═══════════════════════════════════════════════════ */

function Forum({ user, onSignIn }) {
  const el = React.createElement;
  const [posts, setPosts] = useState(() => {
    try { return JSON.parse(localStorage.getItem('debateos_forum') || '[]'); } catch { return []; }
  });
  const [newPost, setNewPost] = useState('');
  const [postType, setPostType] = useState('comment');

  const savePosts = (p) => { setPosts(p); try { localStorage.setItem('debateos_forum', JSON.stringify(p)); } catch {} };

  const submit = () => {
    if (!newPost.trim()) return;
    const post = {
      id: Date.now().toString(),
      author: user ? user.displayName || user.email : 'Anonymous',
      avatar: user ? (user.displayName || 'A').charAt(0).toUpperCase() : 'A',
      type: postType,
      body: newPost.trim(),
      createdAt: new Date().toISOString(),
      likes: 0,
      replies: [],
    };
    savePosts([post, ...posts]);
    setNewPost('');
    // If Firebase is configured, also save to Firestore
    if (firebaseDb && user) {
      firebaseDb.collection('forum_posts').add(post).catch(() => {});
    }
  };

  const likePost = (id) => {
    savePosts(posts.map(p => p.id === id ? {...p, likes: p.likes + 1} : p));
  };

  const deletePost = (id) => {
    savePosts(posts.filter(p => p.id !== id));
  };

  return el('div', {className:'panel'},
    el('div', {style:{marginBottom:20}},
      el('h2', {style:{fontSize:'1.4rem',fontWeight:800,color:'#e4e8f0',marginBottom:4}}, 'Community Forum'),
      el('p', {style:{color:'#94a3b8',fontSize:'.92rem'}}, 'Share cases, ideas, and debate tips with the community.'),
    ),

    // Compose
    el('div', {className:'forum-compose'},
      el('textarea', {
        value: newPost, onChange: e => setNewPost(e.target.value),
        placeholder: user ? 'Share a case, ask a question, or post an idea...' : 'Sign in to post to the forum...',
        disabled: !user,
      }),
      el('div', {className:'forum-compose-row'},
        el('div', {style:{display:'flex',gap:6}},
          ['comment','case','idea'].map(t =>
            el('button', {
              key:t, className:'chip'+(postType===t?' active':''),
              onClick:()=>setPostType(t),
              style:{padding:'6px 14px',fontSize:'.78rem'},
            }, t.charAt(0).toUpperCase()+t.slice(1))
          )
        ),
        user
          ? el('button', {className:'btn btn-primary btn-sm', onClick:submit, disabled:!newPost.trim()}, 'Post')
          : el('button', {className:'btn btn-primary btn-sm', onClick:onSignIn}, 'Sign in to post'),
      ),
    ),

    // Posts list
    posts.length === 0
      ? el('div', {className:'forum-empty'},
          el('div', {style:{fontSize:'2rem',marginBottom:12}}, '\uD83D\uDCAC'),
          'No posts yet. Be the first to share something!',
        )
      : posts.map(p =>
          el('div', {key:p.id, className:'forum-post'},
            el('div', {className:'forum-post-header'},
              el('div', {className:'forum-post-author'},
                el('div', {className:'forum-post-author-avatar'}, p.avatar || 'A'),
                el('span', {className:'forum-post-author-name'}, p.author),
                el('span', {className:'forum-post-time'}, new Date(p.createdAt).toLocaleDateString()),
              ),
              el('span', {className:'forum-post-tag ' + p.type}, p.type),
            ),
            el('div', {className:'forum-post-body'}, p.body),
            el('div', {className:'forum-post-actions'},
              el('button', {className:'forum-action', onClick:()=>likePost(p.id)}, '\u2764\uFE0F ', p.likes || 0),
              (user && (p.author === (user.displayName || user.email) || p.author === 'Anonymous')) &&
                el('button', {className:'forum-action', onClick:()=>deletePost(p.id)}, '\uD83D\uDDD1 Delete'),
            ),
          )
        ),
  );
}

/* ═══════════════════════════════════════════════════
   TAB CONFIG
   ═══════════════════════════════════════════════════ */

const TABS = [
  {id:'case',label:'Case Generator',color:'orange'},
  {id:'feedback',label:'Case Feedback',color:'orange'},
  {id:'res',label:'Motions',color:'green'},
  {id:'vision',label:'Round Vision',color:'green'},
  {id:'casual',label:'Casual',color:'green'},
  {id:'phil',label:'Philosophy',color:'green'},
  {id:'judge',label:'Judge',color:'green'},
  {id:'forum',label:'Forum',color:'green'},
  {id:'newbies',label:'Newbies',color:'green'},
  {id:'resources',label:'Resources',color:'green',href:'https://apda.online/'},
];

function App() {
  const [tab, setTab] = useState('case');
  const [theme, setTheme] = useState('dark');
  const [savedCases, setSavedCases] = useState(() => loadSavedCases());
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [loadedCase, setLoadedCase] = useState(null);
  const [showAuth, setShowAuth] = useState(false);
  const { user, loading: authLoading, signIn, signOut } = useAuth();

  useEffect(() => {
    document.body.className = theme === 'light' ? 'light-theme' : '';
  }, [theme]);

  const saveCase = useCallback((caseData) => {
    const newCase = { ...caseData, id: Date.now().toString(), savedAt: new Date().toISOString() };
    setSavedCases(prev => {
      const updated = [newCase, ...prev];
      persistCases(updated);
      return updated;
    });
  }, []);

  const deleteCase = useCallback((id) => {
    setSavedCases(prev => {
      const updated = prev.filter(c => c.id !== id);
      persistCases(updated);
      return updated;
    });
    if (loadedCase && loadedCase.id === id) setLoadedCase(null);
  }, [loadedCase]);

  const selectCase = useCallback((c) => {
    setLoadedCase(c);
    setTab('case');
  }, []);

  const exportCase = useCallback((c) => {
    const text = [
      'MOTION: ' + c.motion,
      'SIDE: ' + c.side,
      'DEPTH: ' + c.depth,
      'DATE: ' + new Date(c.savedAt).toLocaleDateString(),
      '',
      '---',
      '',
      c.output || c.text || '',
    ].join('\n');
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (c.motion || 'case').substring(0, 50).replace(/[^a-zA-Z0-9 ]/g, '') + '.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, []);

  const handleSignIn = async () => {
    setShowAuth(false);
    await signIn();
  };

  // Wrap a tab component so it stays mounted but hidden when inactive
  const tabPane = (id, component) =>
    React.createElement('div', {
      key: id,
      style: { display: tab === id ? 'block' : 'none' }
    }, component);

  return React.createElement(React.Fragment,null,
    React.createElement(PolyBackground),
    showAuth && React.createElement(AuthModal, { onSignIn: handleSignIn, onSkip: () => setShowAuth(false) }),
    React.createElement(SavedCasesSidebar, {
      isOpen: sidebarOpen,
      onClose: () => setSidebarOpen(false),
      cases: savedCases,
      onSelect: selectCase,
      onDelete: deleteCase,
      onExport: exportCase,
      activeId: loadedCase ? loadedCase.id : null,
    }),
    React.createElement('div',{className:'app'},
      // Cases toggle - fixed top left
      React.createElement('button',{
        className:'cases-toggle',
        onClick:()=>setSidebarOpen(true),
        title:'Saved cases',
      }, '\uD83D\uDCCB'),
      // Profile badge
      user
        ? React.createElement('div',{className:'profile-badge', onClick:signOut, title:'Sign out'},
            React.createElement('div',{className:'profile-avatar'}, (user.displayName || user.email || 'U').charAt(0).toUpperCase()),
            React.createElement('span',{className:'profile-name'}, user.displayName || user.email),
          )
        : React.createElement('div',{className:'profile-badge', onClick:()=>setShowAuth(true), title:'Sign in'},
            React.createElement('div',{className:'profile-avatar',style:{background:'#64748b'}}, '\uD83D\uDC64'),
            React.createElement('span',{className:'profile-name'}, 'Sign in'),
          ),
      // Theme toggle - fixed top right
      React.createElement('button',{
        className:'theme-toggle',
        onClick:()=>setTheme(prev => prev==='dark'?'light':'dark'),
        title: theme==='dark' ? 'Switch to light mode' : 'Switch to dark mode',
      }, theme==='dark' ? '\u2600\uFE0F' : '\uD83C\uDF19'),
      React.createElement('div',{className:'header'},
        React.createElement('h1',{className:'logo'},
          React.createElement('span',{className:'green'},'Debate'),
          React.createElement('span',{className:'white'},'OS')
        ),
        React.createElement('p',{className:'subtitle'},'AI-powered debate toolkit')
      ),
      React.createElement('nav',{className:'nav'},
        TABS.map(t =>
          t.href
            ? React.createElement('a',{
                key:t.id,
                className:'nav-btn',
                href:t.href,
                target:'_blank',
                rel:'noopener noreferrer',
                style:{textDecoration:'none'},
              }, t.label + ' \u2197')
            : React.createElement('button',{
                key:t.id,
                className:'nav-btn'+(tab===t.id?(t.color==='orange'?' active-orange':' active'):''),
                onClick:()=>setTab(t.id)
              },t.label)
        )
      ),
      // All tabs rendered but only active one visible — preserves state across switches
      tabPane('case', React.createElement(CaseGenerator, { onSave: saveCase, loadedCase: loadedCase, onClearLoaded: () => setLoadedCase(null) })),
      tabPane('feedback', React.createElement(CaseFeedback)),
      tabPane('res', React.createElement(Resolutions)),
      tabPane('vision', React.createElement(RoundVision)),
      tabPane('casual', React.createElement(Casual)),
      tabPane('phil', React.createElement(Philosophy)),
      tabPane('judge', React.createElement(Judge)),
      tabPane('forum', React.createElement(Forum, { user: user, onSignIn: () => setShowAuth(true) })),
      tabPane('newbies', React.createElement(Newbies)),
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
