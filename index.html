   FORUM COMPONENT
   ═══════════════════════════════════════════════════ */

function Forum({ user, onSignIn }) {
  const el = React.createElement;
  const [posts, setPosts] = useState(() => {
    try { return JSON.parse(localStorage.getItem('debateos_forum') || '[]'); } catch { return []; }
  });
  const [newPost, setNewPost] = useState('');
  const [postType, setPostType] = useState('comment');

  const savePosts = (p) => { setPosts(p); try { localStorage.setItem('debateos_forum', JSON.stringify(p)); } catch {} };

  const submit = () => {
    if (!newPost.trim()) return;
    const post = {
      id: Date.now().toString(),
      author: user ? user.displayName || user.email : 'Anonymous',
      avatar: user ? (user.displayName || 'A').charAt(0).toUpperCase() : 'A',
      type: postType,
      body: newPost.trim(),
      createdAt: new Date().toISOString(),
      likes: 0,
      replies: [],
    };
    savePosts([post, ...posts]);
    setNewPost('');
    // If Firebase is configured, also save to Firestore
    if (firebaseDb && user) {
      firebaseDb.collection('forum_posts').add(post).catch(() => {});
    }
  };

  const likePost = (id) => {
    savePosts(posts.map(p => p.id === id ? {...p, likes: p.likes + 1} : p));
  };

  const deletePost = (id) => {
    savePosts(posts.filter(p => p.id !== id));
  };

  return el('div', {className:'panel'},
    el('div', {style:{marginBottom:20}},
      el('h2', {style:{fontSize:'1.4rem',fontWeight:800,color:'#e4e8f0',marginBottom:4}}, 'Community Forum'),
      el('p', {style:{color:'#94a3b8',fontSize:'.92rem'}}, 'Share cases, ideas, and debate tips with the community.'),
    ),

    // Compose
    el('div', {className:'forum-compose'},
      el('textarea', {
        value: newPost, onChange: e => setNewPost(e.target.value),
        placeholder: user ? 'Share a case, ask a question, or post an idea...' : 'Sign in to post to the forum...',
        disabled: !user,
      }),
      el('div', {className:'forum-compose-row'},
        el('div', {style:{display:'flex',gap:6}},
          ['comment','case','idea'].map(t =>
            el('button', {
              key:t, className:'chip'+(postType===t?' active':''),
              onClick:()=>setPostType(t),
              style:{padding:'6px 14px',fontSize:'.78rem'},
            }, t.charAt(0).toUpperCase()+t.slice(1))
          )
        ),
        user
          ? el('button', {className:'btn btn-primary btn-sm', onClick:submit, disabled:!newPost.trim()}, 'Post')
          : el('button', {className:'btn btn-primary btn-sm', onClick:onSignIn}, 'Sign in to post'),
      ),
    ),

    // Posts list
    posts.length === 0
      ? el('div', {className:'forum-empty'},
          el('div', {style:{fontSize:'2rem',marginBottom:12}}, '\uD83D\uDCAC'),
          'No posts yet. Be the first to share something!',
        )
      : posts.map(p =>
          el('div', {key:p.id, className:'forum-post'},
            el('div', {className:'forum-post-header'},
              el('div', {className:'forum-post-author'},
                el('div', {className:'forum-post-author-avatar'}, p.avatar || 'A'),
                el('span', {className:'forum-post-author-name'}, p.author),
                el('span', {className:'forum-post-time'}, new Date(p.createdAt).toLocaleDateString()),
              ),
              el('span', {className:'forum-post-tag ' + p.type}, p.type),
            ),
            el('div', {className:'forum-post-body'}, p.body),
            el('div', {className:'forum-post-actions'},
              el('button', {className:'forum-action', onClick:()=>likePost(p.id)}, '\u2764\uFE0F ', p.likes || 0),
              (user && (p.author === (user.displayName || user.email) || p.author === 'Anonymous')) &&
                el('button', {className:'forum-action', onClick:()=>deletePost(p.id)}, '\uD83D\uDDD1 Delete'),
            ),
          )
        ),
  );
}

/* ═══════════════════════════════════════════════════
   ROUND SIMULATOR — Full 6-speech debate simulation
   ═══════════════════════════════════════════════════ */

const ROUND_SPEECHES = [
  { code:'PM', title:'Prime Minister Constructive', side:'gov', time:'7 min', player:true, order:0 },
  { code:'LO', title:'Leader of Opposition', side:'opp', time:'8 min', player:false, order:1 },
  { code:'MG', title:'Member of Government', side:'gov', time:'8 min', player:true, order:2 },
  { code:'MO', title:'Member of Opposition', side:'opp', time:'8 min', player:false, order:3 },
  { code:'LOR', title:'Leader of Opp Rebuttal', side:'opp', time:'4 min', player:false, order:4 },
  { code:'PMR', title:'PM Rebuttal', side:'gov', time:'5 min', player:true, order:5 },
];

function RoundSimulator() {
  const el = React.createElement;
  const [motion, setMotion] = useState('');
  const [side, setSide] = useState('gov');
  const [roundStarted, setRoundStarted] = useState(false);
  const [currentSpeech, setCurrentSpeech] = useState(0);
  const [speeches, setSpeeches] = useState([]);
  const [inputText, setInputText] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiStreaming, setAiStreaming] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const [feedbackLoading, setFeedbackLoading] = useState(false);
  const [recording, setRecording] = useState(false);
  const [mediaRec, setMediaRec] = useState(null);
  const [roundComplete, setRoundComplete] = useState(false);
  const [error, setError] = useState(null);
  const inputRef = useRef(null);
  const streamRef = useRef(null);

  const playerSpeechCodes = side === 'gov'
    ? ['PM','MG','PMR']
    : ['LO','MO','LOR'];

  const isPlayerSpeech = (idx) => {
    const speech = ROUND_SPEECHES[idx];
    return (side === 'gov' && speech.side === 'gov') || (side === 'opp' && speech.side === 'opp');
  };

  // Mic recording with Web Speech API or MediaRecorder
  const startRecording = async () => {
    setError(null);
    // Try Web Speech API first (real-time transcription)
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRec();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      let finalTranscript = inputText;
      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript + ' ';
          } else {
            interim += event.results[i][0].transcript;
          }
        }
        setInputText(finalTranscript + interim);
      };
      recognition.onerror = (e) => {
        if (e.error !== 'no-speech') setError('Mic error: ' + e.error);
        setRecording(false);
      };
      recognition.onend = () => setRecording(false);
      recognition.start();
      setMediaRec(recognition);
      setRecording(true);
    } else {
      setError('Speech recognition not supported in this browser. Try Chrome.');
    }
  };

  const stopRecording = () => {
    if (mediaRec) {
      try { mediaRec.stop(); } catch(e) {}
      setMediaRec(null);
    }
    setRecording(false);
  };

  const startRound = () => {
    if (!motion.trim()) return;
    setRoundStarted(true);
    setCurrentSpeech(0);
    setSpeeches([]);
    setFeedback(null);
    setRoundComplete(false);
    setInputText('');

    // If player is Opp, AI goes first with PM
    if (side === 'opp') {
      generateAISpeech(0, []);
    }
  };

  const buildRoundContext = (speechesSoFar) => {
    let ctx = `MOTION: ${motion}\n\n`;
    ctx += `ROUND SO FAR:\n`;
    speechesSoFar.forEach((s, i) => {
      ctx += `\n--- ${ROUND_SPEECHES[i].code} (${ROUND_SPEECHES[i].title}) ---\n${s}\n`;
    });
    return ctx;
  };

  const generateAISpeech = async (speechIdx, speechesSoFar) => {
    setAiLoading(true);
    setAiStreaming(true);
    setError(null);

    const speech = ROUND_SPEECHES[speechIdx];
    const aiSide = speech.side;
    const isRebuttal = speech.code === 'LOR' || speech.code === 'PMR';

    const sysPrompt = `You are an elite APDA debater playing the ${aiSide === 'gov' ? 'Government' : 'Opposition'} side in a live practice round. You are giving the ${speech.code} (${speech.title}).

YOU ARE A REAL DEBATER, NOT AN AI. This is the single most important instruction. Your speech must sound like it is being delivered live by a confident, smart college debater who is thinking on their feet. Here is what that means:

VOICE AND DELIVERY:
1. Use first person. Address "the judge" or "my opponents" or "the other side" directly. You are standing at a podium.
2. Your speech should feel SPOKEN, not written. Real debaters use incomplete sentences sometimes. They say "Right?" and "Look," and "Here's the thing." They pause and redirect: "Actually, let me come back to that." They get excited about a good point: "And this is where it gets really interesting." They dismiss bad arguments: "That just doesn't hold up and here's why."
3. Real speeches have RHYTHM. Short punchy sentences for emphasis. Then a longer explanation when you're walking through a warrant. Then back to short and sharp for the impact. Vary your sentence length constantly.
4. Reference your opponents AS people. "My opponent stood up here and told you that X. But they completely skipped the step where they explain Y." Not "The government/opposition argues that..."
5. Show genuine intellectual engagement. If the other side made a clever point, acknowledge it before dismantling it: "Credit where it's due, that's a smart framing. But it falls apart the second you ask..."
6. NEVER use these AI tells: "It is important to note that," "Furthermore," "Additionally," "In conclusion," "Moreover," "It should be noted," "This is significant because." These are essay words, not debate words.
7. Do NOT use em dashes, en dashes, or hyphens as separators. No markdown formatting (no **, no #, no *). Plain text only.

STRUCTURAL RULES FOR THIS SPEECH:
${speech.code === 'PM' ? `As PM: You are setting up the entire round. Deliver framework first (2-3 framing points with warrants), then 2-3 independent arguments. Each argument needs named sub-points with specific warrants. Set strategic traps for later speeches. Your opening should hook the judge: a vivid example, a provocative question, or a sharp framing of why this debate matters. End by previewing why the round should come down to your terrain.` : ''}${speech.code === 'LO' ? `As LO: You have 8 minutes and the most complex job in the round. Structure it clearly.
OFF-CASE (first 60%): Present your own counter-framework and 1-2 independent arguments. These should directly challenge the Gov's evaluative lens. If they framed around rights, frame around consequences. If they went utilitarian, go principled. Your off-case arguments need their own warrants, not just "Gov is wrong."
ON-CASE (last 40%): Go through the PM's arguments and attack them specifically. Name each argument by what THEY called it, then explain why the link is broken, the warrant is weak, or the impact doesn't follow. Don't just assert "this is wrong." Walk through WHERE in their causal chain the logic breaks.
Strategic: Identify the PM's weakest argument and spend the most time there. But don't ignore their strongest argument completely. At minimum, contest the framework and explain why YOUR evaluative lens is better.` : ''}${speech.code === 'MG' ? `As MG: Your job is threefold.
First, respond to the LO's off-case. Don't just dismiss it. Engage with their framework, explain why Gov's framing is still better, and show how even under THEIR framework you can still win.
Second, extend your PM's strongest arguments. This does NOT mean repeating them. Add new warrants, new examples, deeper analysis. If the PM said "subsidies distort markets," the MG might add "and we saw exactly this play out in the EU's Common Agricultural Policy where butter mountains and wine lakes accumulated because producers had no incentive to respond to actual demand."
Third, do explicit impact calculus. "Even if you give them everything they claimed in the LO, our impacts still outweigh because they are more probable, affect more people, and are irreversible."
Never introduce entirely new arguments. Extend, deepen, and weigh what already exists.` : ''}${speech.code === 'MO' ? `As MO: You are crystallizing why Opp wins.
Extend the LO's best arguments with new depth. Respond directly to anything the MG said. If MG dropped an LO argument, point that out explicitly: "Notice that the MG completely ignored our argument about X. That argument is still standing uncontested."
Reframe the round in Opp's favor. Tell the judge what the key questions are and why Opp is winning on each one.
This is your last chance to introduce new analysis (the LOR and PMR are rebuttals). Make it count. But make sure you're building on the LO's framework, not starting a new case.` : ''}${speech.code === 'LOR' ? `As LOR: This is a 4-minute rebuttal. No new arguments.
Structure: Identify the 2-3 most important clash points in the round. For each one:
1. State what both sides said
2. Explain why Opp wins this clash (using warrants, not just assertions)
3. Explain why winning this clash matters more than whatever Gov thinks they're winning on
End with a clear voting issue. "Judge, the question you need to ask yourself is..." Give the judge a simple decision calculus that favors Opp.
Be aggressive but precise. Drop the arguments that don't matter. Spend your time where the round is actually being decided.` : ''}${speech.code === 'PMR' ? `As PMR: This is a 5-minute rebuttal and the last speech in the round. No new arguments.
Structure: Start with a big picture reframe. "What is this round actually about?" Then pull through your 2-3 strongest points, explain why they survived everything Opp threw at them, and weigh.
For weighing, be explicit: "Even if you give them their best version of X, our Y still outweighs because [scope/probability/reversibility/timeframe]."
Address the LOR directly. If they mischaracterized your arguments, call it out. If they dropped something, hammer it.
End with your single clearest voting issue. Make the judge's decision feel easy. "At the end of the day, this round comes down to one question: [your question]. And on that question, Gov wins clearly because [your best warrant]."` : ''}

${isRebuttal ? 'This is a REBUTTAL speech. You CANNOT introduce new arguments. You can only extend, weigh, and crystallize arguments already in the round. Reference specific things said in previous speeches by name.' : 'Engage directly with what has been said so far. Reference specific arguments, warrants, and claims from previous speeches by name.'}

WARRANT AND KNOWLEDGE RULES:
1. All knowledge must be common knowledge an educated college student would know. No spec (hyper-specific statistics or obscure references).
2. Warrants should be specific and mechanistic. Not "this hurts the economy" but "this creates a moral hazard because actors insulated from downside risk take bigger bets, which is exactly what happened with the 2008 financial crisis."
3. Use real examples but keep them well-known: the 2008 crash, the EU, major Supreme Court cases, widely reported events, basic economic/philosophical principles.

ADVANCED TECHNIQUES TO USE IN YOUR SPEECH:
1. KNIFE their arguments: Take the opponent's own logic and show it proves YOUR point. "Their argument about X actually helps us because if you follow that logic it means Y, which is exactly what we're arguing."
2. CROSS-APPLY between arguments: "Cross-apply the warrant from our first argument. If that mechanism works, this impact is guaranteed."
3. FLAG DROPS: If the opponent ignored one of your arguments, hammer it: "Notice they completely dropped our argument about X. That argument is still standing uncontested and it alone is sufficient to win this round."
4. INTUITION PUMPS: Use vivid images the judge will remember. "Cats always look out the window even though they know they're never going to be let outside." "Persuading a rice farmer he can become an airplane manufacturer is very difficult."
5. "EVEN IF" CASCADING: Stack concessions to show your argument survives anything. "Even if you give them X, even if you buy Y, even if Z is true, our argument still wins because..."

Speech length: ${isRebuttal ? '400-600' : '700-1100'} words, matching a ${speech.time} speech.`;

    const userPrompt = buildRoundContext(speechesSoFar) + `\n\nNow deliver the ${speech.code} speech (${speech.title}, ${speech.time}). Write it as a full speech:`;

    let aiText = '';
    try {
      await callClaude(sysPrompt, userPrompt, (text) => {
        aiText = text;
        // Update the speeches array in real-time
        setSpeeches(prev => {
          const updated = [...prev];
          updated[speechIdx] = text;
          return updated;
        });
      }, { thinkBudget: 6000, maxTokens: 8000 });
    } catch(e) {
      setError('AI error: ' + e.message);
    }

    setAiLoading(false);
    setAiStreaming(false);

    // Check if round is complete
    if (speechIdx === 5) {
      setRoundComplete(true);
      generateRoundFeedback([...speechesSoFar.slice(0, speechIdx), aiText]);
    } else {
      setCurrentSpeech(speechIdx + 1);
      setInputText('');
    }
  };

  const submitSpeech = () => {
    if (!inputText.trim() || aiLoading) return;
    if (recording) stopRecording();

    const newSpeeches = [...speeches];
    newSpeeches[currentSpeech] = inputText.trim();
    setSpeeches(newSpeeches);

    // Check if round complete
    if (currentSpeech === 5) {
      setRoundComplete(true);
      setCurrentSpeech(6);
      generateRoundFeedback(newSpeeches);
      return;
    }

    // Advance to next speech
    const nextIdx = currentSpeech + 1;
    setCurrentSpeech(nextIdx);
    setInputText('');

    // If next speech is AI's, generate it
    if (!isPlayerSpeech(nextIdx)) {
      generateAISpeech(nextIdx, newSpeeches);
    }
  };

  const generateRoundFeedback = async (allSpeeches) => {
    setFeedbackLoading(true);
    const sysPrompt = `You are an expert APDA debate judge and coach. You just watched a full practice round. You have judged at Nationals, you have coached breaking teams, and you give feedback the way a real judge does: specific, honest, and grounded in what actually happened in the round.

DECISION AND RFD (Reason for Decision):
Start with your decision. Who won, and why? Write this the way a judge would explain it in the round:
"I'm voting [Gov/Opp] on this round. Here's why."
Then explain the 2-3 key issues that decided the round. For each one, explain what both sides said, who you think won that clash, and why. Be specific. Reference actual arguments and warrants from the speeches. If one side dropped something important, say so. If one side's weighing was better, explain what made it better.
Be honest. If the player lost, say so clearly and explain what the opponent did better. Sugarcoating doesn't help anyone improve.

SPEECH-BY-SPEECH FEEDBACK for the player's speeches:
For each speech the PLAYER gave (not the AI opponent), provide:

1. SPEAKER SCORE: Use the real APDA scale.
   26-27: Below average. Major structural or strategic problems.
   28-29: Average varsity. Competent but not distinctive.
   30-31: Above average. Good warrants, some strategic awareness.
   32-33: Strong. Would break at most tournaments.
   34-35: Excellent. Would break at Nationals.
   36+: Elite. Top speaker award caliber.
   Give a number and a 1-2 sentence justification.

2. BEST MOMENT: Quote a specific line or argument from their speech that was effective and explain why it worked.

3. BIGGEST PROBLEM: Identify the single most damaging weakness. Not a minor style point. The thing that actually cost them speaker points or hurt their side's chances. Be brutally specific. "Your second argument had no warrant. You said X leads to Y but you never explained the mechanism. A good opp team would have called that out and you'd have nothing to say."

4. WHAT TO DO DIFFERENTLY: One concrete, actionable thing they should change for their next round. Not "be more persuasive." Something like "Spend the first 90 seconds of your MG on the LO's off-case before going back to your constructive. You let their framework stand uncontested and that's what cost you."

ROUND DYNAMICS:
End with a brief section on the round as a whole:
1. What was the central clash? Where was the round actually decided?
2. Was the round tight or lopsided? If lopsided, what caused it?
3. What is the single most important skill this debater should drill before their next tournament?

Do NOT use markdown formatting (no **, no #, no *). Do not use em dashes, en dashes, or hyphens as separators. Write in natural prose with numbered sections and lettered sub-points where needed.`;

    const userPrompt = `MOTION: ${motion}\nPLAYER SIDE: ${side === 'gov' ? 'Government' : 'Opposition'}\n\n` +
      allSpeeches.map((s, i) => `--- ${ROUND_SPEECHES[i].code} (${isPlayerSpeech(i) ? 'PLAYER' : 'AI OPPONENT'}) ---\n${s || '(no speech given)'}`).join('\n\n') +
      '\n\nProvide your judge feedback:';

    let fbText = '';
    try {
      await callClaude(sysPrompt, userPrompt, (text) => {
        fbText = text;
        setFeedback(text);
      }, { thinkBudget: 8000, maxTokens: 12000 });
    } catch(e) {
      setFeedback('Error generating feedback: ' + e.message);
    }
    setFeedbackLoading(false);
  };

  const resetRound = () => {
    setRoundStarted(false);
    setCurrentSpeech(0);
    setSpeeches([]);
    setInputText('');
    setFeedback(null);
    setRoundComplete(false);
    setError(null);
    if (recording) stopRecording();
  };

  // === RENDER ===

  if (!roundStarted) {
    return el('div',{className:'panel'},
      el('p',{style:{color:'#7a8da4',marginBottom:20,lineHeight:1.7}},
        'Simulate a full APDA round against an AI opponent. You deliver your speeches (type or speak into mic), the AI plays the other team. After all 6 speeches, get detailed judge feedback and speaker scores.'
      ),
      el('label',{className:'field-label'},'Motion'),
      el('textarea',{
        placeholder:'Enter a motion for the round...',
        value:motion, onChange:e=>setMotion(e.target.value),
        rows:3
      }),
      el('div',{style:{marginTop:20}},
        el('label',{className:'field-label green'},'Your Side'),
        el('div',{style:{display:'flex',gap:10,marginTop:8}},
          el('button',{
            className:'btn ' + (side==='gov'?'btn-primary':'btn-secondary'),
            onClick:()=>setSide('gov'),
            style:{flex:1}
          },'Government'),
          el('button',{
            className:'btn ' + (side==='opp'?'btn-primary':'btn-secondary'),
            onClick:()=>setSide('opp'),
            style:{flex:1}
          },'Opposition'),
        )
      ),
      el('div',{style:{marginTop:24}},
        el('button',{
          className:'btn btn-orange',
          onClick:startRound,
          disabled:!motion.trim(),
          style:{padding:'16px 48px',fontSize:'1.1rem',borderRadius:14,width:'100%'}
        },'Start Round')
      )
    );
  }

  // Round in progress
  const currentSpeechData = currentSpeech < 6 ? ROUND_SPEECHES[currentSpeech] : null;
  const isMyTurn = currentSpeechData && isPlayerSpeech(currentSpeech);
  const isAiTurn = currentSpeechData && !isPlayerSpeech(currentSpeech);

  return el('div',{className:'panel panel-expanded'},
    // Round header
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},
      el('div',null,
        el('div',{style:{fontSize:'.78rem',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700}},'Round Simulator'),
        el('div',{style:{fontSize:'.88rem',color:'#e0e7ef',marginTop:4}}, motion.length > 80 ? motion.substring(0,80)+'...' : motion),
      ),
      el('button',{className:'btn btn-secondary btn-sm',onClick:resetRound},'End Round')
    ),

    // Speech progress bar
    el('div',{style:{display:'flex',gap:4,marginBottom:24}},
      ROUND_SPEECHES.map((s, i) => {
        const isCompleted = speeches[i] && speeches[i].length > 0;
        const isCurrent = i === currentSpeech;
        const isPlayer = isPlayerSpeech(i);
        return el('div',{
          key:s.code,
          style:{
            flex:1, padding:'8px 4px', borderRadius:8, textAlign:'center',
            fontSize:'.72rem', fontWeight:700, letterSpacing:'.5px',
            background: isCurrent ? (isPlayer ? '#ef444425' : '#3b82f625') : isCompleted ? '#22c55e15' : '#ffffff06',
            border: '1.5px solid ' + (isCurrent ? (isPlayer ? '#ef4444' : '#3b82f6') : isCompleted ? '#22c55e40' : '#ffffff10'),
            color: isCurrent ? (isPlayer ? '#f87171' : '#60a5fa') : isCompleted ? '#4ade80' : '#566478',
          }
        },
          el('div',null, s.code),
          el('div',{style:{fontSize:'.6rem',fontWeight:400,marginTop:2,opacity:.7}},
            isPlayer ? 'YOU' : 'AI'
          )
        );
      })
    ),

    // Previous speeches (scrollable)
    speeches.length > 0 && el('div',{style:{maxHeight:300,overflowY:'auto',marginBottom:20,borderRadius:12,border:'1px solid #ffffff0a'}},
      speeches.map((text, i) => {
        if (!text) return null;
        const s = ROUND_SPEECHES[i];
        const isP = isPlayerSpeech(i);
        return el('div',{key:i,style:{
          padding:'14px 18px', borderBottom:'1px solid #ffffff08',
          background: i === currentSpeech - 1 ? '#ffffff04' : 'transparent',
        }},
          el('div',{style:{
            display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6,
          }},
            el('span',{style:{
              fontSize:'.75rem',fontWeight:700,letterSpacing:'.5px',
              color: isP ? '#f87171' : '#60a5fa',
            }}, s.code + ' ' + (isP ? '(You)' : '(AI)')),
            el('span',{style:{fontSize:'.68rem',color:'#566478'}}, s.time),
          ),
          el('div',{style:{
            fontSize:'.85rem',color:'#a0aec0',lineHeight:1.6,
            maxHeight: i < currentSpeech - 1 ? 80 : 'none',
            overflow: i < currentSpeech - 1 ? 'hidden' : 'visible',
          }},
            text.length > 500 && i < currentSpeech - 1 ? text.substring(0,500) + '...' : text
          )
        );
      })
    ),

    // Current speech area
    !roundComplete && currentSpeechData && el('div',{style:{marginBottom:20}},
      el('div',{style:{
        display:'flex',justifyContent:'space-between',alignItems:'center',
        marginBottom:12,padding:'12px 18px',borderRadius:10,
        background: isMyTurn ? '#ef444410' : '#3b82f610',
        border:'1px solid ' + (isMyTurn ? '#ef444430' : '#3b82f630'),
      }},
        el('div',null,
          el('div',{style:{fontSize:'1rem',fontWeight:800,color: isMyTurn ? '#f87171' : '#60a5fa'}},
            isMyTurn ? 'Your Turn: ' + currentSpeechData.code : 'AI is speaking: ' + currentSpeechData.code
          ),
          el('div',{style:{fontSize:'.82rem',color:'#94a3b8',marginTop:2}},
            currentSpeechData.title + ' (' + currentSpeechData.time + ')'
          ),
        ),
        isMyTurn && el('div',{style:{display:'flex',gap:8}},
          el('button',{
            className: recording ? 'btn btn-record' : 'btn btn-secondary btn-sm',
            onClick: recording ? stopRecording : startRecording,
            style: recording ? {animation:'pulse 1.5s infinite'} : {},
          }, recording ? '\u23F9 Stop Mic' : '\uD83C\uDF99\uFE0F Mic'),
        )
      ),

      // AI generating indicator
      aiLoading && el('div',{style:{padding:20,textAlign:'center'}},
        el('div',{className:'spinner',style:{display:'inline-block',marginRight:10}}),
        el('span',{style:{color:'#60a5fa',fontSize:'.92rem'}},'AI is preparing their ' + currentSpeechData.code + '...'),
        aiStreaming && speeches[currentSpeech] && el('div',{
          ref:streamRef,
          style:{
            marginTop:16,textAlign:'left',fontSize:'.85rem',color:'#a0aec0',lineHeight:1.6,
            maxHeight:300,overflowY:'auto',padding:'14px 18px',
            background:'#0a1018',borderRadius:12,border:'1px solid #ffffff0a',
          }
        }, speeches[currentSpeech])
      ),

      // Player input area
      isMyTurn && !aiLoading && el('div',null,
        el('textarea',{
          ref:inputRef,
          className:'practice-textarea',
          placeholder: 'Type your ' + currentSpeechData.code + ' speech here, or use the mic button to speak...',
          value:inputText,
          onChange:e=>setInputText(e.target.value),
          rows:10,
          style:{minHeight:200},
        }),
        el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12}},
          el('span',{style:{fontSize:'.78rem',color:'#566478'}},
            (inputText.split(/\s+/).filter(w=>w).length) + ' words'
          ),
          el('button',{
            className:'btn btn-primary',
            onClick:submitSpeech,
            disabled:!inputText.trim(),
            style:{padding:'12px 32px'},
          }, 'Submit ' + currentSpeechData.code)
        )
      ),
    ),

    // Error
    error && el('div',{style:{padding:'12px 18px',background:'#ef444415',border:'1px solid #ef444440',borderRadius:10,color:'#fca5a5',fontSize:'.88rem',marginBottom:16}}, error),

    // Round complete + feedback
    roundComplete && el('div',null,
      el('div',{style:{
        textAlign:'center',padding:'24px',marginBottom:20,
        background:'linear-gradient(145deg,#0e1620,#121c2c)',
        border:'1px solid #22c55e30',borderRadius:16,
      }},
        el('div',{style:{fontSize:'1.2rem',fontWeight:800,color:'#4ade80'}},'Round Complete'),
        el('div',{style:{fontSize:'.88rem',color:'#94a3b8',marginTop:6}},'All 6 speeches delivered. Judge feedback below.'),
      ),

      feedbackLoading && el('div',{style:{textAlign:'center',padding:30}},
        el('div',{className:'spinner',style:{display:'inline-block',marginRight:10}}),
        el('span',{style:{color:'#fbbf24'}},'Judge is deliberating...')
      ),

      feedback && el('div',{style:{
        padding:'24px 28px',background:'linear-gradient(145deg,#0e1620,#121c2c)',
        border:'1px solid #fbbf2430',borderRadius:16,lineHeight:1.7,
        color:'#c8d5e3',fontSize:'.92rem',whiteSpace:'pre-wrap',
      }},
        el('div',{style:{fontSize:'.78rem',fontWeight:700,color:'#fbbf24',letterSpacing:'1px',textTransform:'uppercase',marginBottom:12}},'Judge Feedback'),
        feedback
      ),

      el('div',{style:{display:'flex',gap:12,marginTop:20,justifyContent:'center'}},
        el('button',{className:'btn btn-primary',onClick:resetRound},'New Round'),
        el('button',{className:'btn btn-secondary',onClick:()=>{
          if (navigator.clipboard) navigator.clipboard.writeText(
            'MOTION: ' + motion + '\n\n' +
            speeches.map((s,i) => '--- ' + ROUND_SPEECHES[i].code + ' ---\n' + (s||'')).join('\n\n') +
            '\n\n--- JUDGE FEEDBACK ---\n' + (feedback || '')
          );
        }},'Copy Round Transcript'),
      )
    ),
  );
}

   TAB CONFIG
   ═══════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════
   WELCOME GUIDE
   ═══════════════════════════════════════════════════ */

  const el = React.createElement;
  const tools = [
    { name: 'Case Generator', desc: 'Enter a motion and get a full debate case with contentions, warrants, and A2 blocks.' },
    { name: 'Round Simulator', desc: 'Practice against an AI opponent. Choose your side and run through a full round.' },
    { name: 'Case Feedback', desc: 'Paste your case and get detailed judge-level critiques with highlighted suggestions.' },
    { name: 'Round Vision', desc: 'Visualize argument clashes on an interactive map showing how gov and opp connect.' },
    { name: 'Practice Drills', desc: 'Timed speaking exercises, POI training, and rebuttal drills to sharpen your skills.' },
    { name: 'Philosophy', desc: 'Ask any philosophical question and get a deep, debate-relevant breakdown.' },
  ];
  return el('div',{className:'guide-overlay',onClick:(e)=>{if(e.target===e.currentTarget)onClose()}},
    el('div',{className:'guide-modal'},
      el('h2',null,'Welcome to ',el('span',{className:'accent'},'DebateOS')),
      el('p',{className:'guide-sub'},'Everything you need to prep, practice, and win. Here is how to get started:'),
      el('div',{className:'guide-step'},
        el('div',{className:'guide-step-num'},'1'),
        el('div',{className:'guide-step-content'},
          el('h3',null,'Generate a case'),
          el('p',null,'Head to Case Generator, type in any motion (or pick one from Motions), choose your side and depth, and hit generate. You will get a full structured case in under a minute.'),
        ),
      ),
      el('div',{className:'guide-step'},
        el('div',{className:'guide-step-num'},'2'),
        el('div',{className:'guide-step-content'},
          el('h3',null,'Get feedback'),
          el('p',null,'Paste any case into Case Feedback for detailed judge-level analysis. It highlights weak warrants, missing impacts, and gives specific suggestions.'),
        ),
      ),
      el('div',{className:'guide-step'},
        el('div',{className:'guide-step-num'},'3'),
        el('div',{className:'guide-step-content'},
          el('h3',null,'Practice and drill'),
          el('p',null,'Use Round Simulator to practice against AI, or hit Practice for timed speaking drills. The more reps you get, the sharper you will be in round.'),
        ),
      ),
      el('div',{className:'guide-step'},
        el('div',{className:'guide-step-num'},'4'),
        el('div',{className:'guide-step-content'},
          el('h3',null,'Visualize and refine'),
          el('p',null,'After a simulated round, check Round Vision to see how arguments clashed. Use this to find gaps in your case and strengthen your weakest points.'),
        ),
      ),
      el('h3',{style:{color:'#e4e8f0',fontSize:'1rem',fontWeight:700,marginBottom:'12px',marginTop:'8px'}},'Your toolkit'),
      el('div',{className:'guide-tools'},
        tools.map((t,i) => el('div',{key:i,className:'guide-tool'},
          el('div',{className:'gt-name'},t.name),
          el('div',{className:'gt-desc'},t.desc),
        ))
      ),
      el('button',{className:'guide-close',onClick:onClose},'Start debating'),
    )
  );
}

const TABS = [
  // Core tools
  {id:'case',label:'Case Gen'},
  {id:'simulator',label:'Round Sim'},
  {id:'feedback',label:'Feedback'},
  {id:'vision',label:'Vision'},
  {id:'divider1',divider:true},
  // Training
  {id:'practice',label:'Practice'},
  {id:'res',label:'Motions'},
  {id:'casual',label:'Casual'},
  {id:'phil',label:'Philosophy'},
  {id:'divider2',divider:true},
  // Community
  {id:'judge',label:'Judge'},
  {id:'forum',label:'Forum'},
  {id:'newbies',label:'Guide'},
  {id:'resources',label:'Resources',href:'https://apda.online/'},
];

function App() {
  const [tab, setTab] = useState('case');
  const [savedCases, setSavedCases] = useState(() => loadSavedCases());
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [loadedCase, setLoadedCase] = useState(null);
  const [showAuth, setShowAuth] = useState(false);
  const [showGuide, setShowGuide] = useState(() => {
    try { return !localStorage.getItem('debateos-welcomed'); } catch(e) { return true; }
  });
  const { user, loading: authLoading, signIn, signOut } = useAuth();

  const closeGuide = useCallback(() => {
    setShowGuide(false);
    try { localStorage.setItem('debateos-welcomed','1'); } catch(e) {}
  }, []);

  const saveCase = useCallback((caseData) => {
    const newCase = { ...caseData, id: Date.now().toString(), savedAt: new Date().toISOString() };
    setSavedCases(prev => {
      const updated = [newCase, ...prev];
      persistCases(updated);
      return updated;
    });
  }, []);

  const deleteCase = useCallback((id) => {
    setSavedCases(prev => {
      const updated = prev.filter(c => c.id !== id);
      persistCases(updated);
      return updated;
    });
    if (loadedCase && loadedCase.id === id) setLoadedCase(null);
  }, [loadedCase]);

  const selectCase = useCallback((c) => {
    setLoadedCase(c);
    setTab('case');
  }, []);

  const exportCase = useCallback((c) => {
    const text = [
      'MOTION: ' + c.motion,
      'SIDE: ' + c.side,
      'DEPTH: ' + c.depth,
      'DATE: ' + new Date(c.savedAt).toLocaleDateString(),
      '',
      '---',
      '',
      c.output || c.text || '',
    ].join('\n');
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (c.motion || 'case').substring(0, 50).replace(/[^a-zA-Z0-9 ]/g, '') + '.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, []);

  const handleSignIn = async () => {
    setShowAuth(false);
    await signIn();
  };

  // Wrap a tab component so it stays mounted but hidden when inactive
  const tabPane = (id, component) =>
    React.createElement('div', {
      key: id,
      style: { display: tab === id ? 'block' : 'none', width: '100%' }
    }, component);

  return React.createElement(React.Fragment,null,
    React.createElement(PolyBackground),
    showGuide && React.createElement(WelcomeGuide, { onClose: closeGuide, onNavigate: setTab }),
    !showGuide && React.createElement('button',{className:'guide-trigger',onClick:()=>setShowGuide(true),title:'How to use DebateOS'},'?'),
    showAuth && React.createElement(AuthModal, { onSignIn: handleSignIn, onSkip: () => setShowAuth(false) }),
    React.createElement(SavedCasesSidebar, {
      isOpen: sidebarOpen,
      onClose: () => setSidebarOpen(false),
      cases: savedCases,
      onSelect: selectCase,
      onDelete: deleteCase,
      onExport: exportCase,
      activeId: loadedCase ? loadedCase.id : null,
    }),
    React.createElement('div',{className:'app'},
      // Cases toggle - fixed top left
      React.createElement('button',{
        className:'cases-toggle',
        onClick:()=>setSidebarOpen(true),
        title:'Saved cases',
      }, '\uD83D\uDCCB'),
      // Profile badge
      user
        ? React.createElement('div',{className:'profile-badge', onClick:signOut, title:'Sign out'},
            React.createElement('div',{className:'profile-avatar'}, (user.displayName || user.email || 'U').charAt(0).toUpperCase()),
            React.createElement('span',{className:'profile-name'}, user.displayName || user.email),
          )
        : React.createElement('div',{className:'profile-badge', onClick:()=>setShowAuth(true), title:'Sign in'},
            React.createElement('div',{className:'profile-avatar',style:{background:'#64748b'}}, '\uD83D\uDC64'),
            React.createElement('span',{className:'profile-name'}, 'Sign in'),
          ),
      React.createElement('div',{className:'header'},
        React.createElement('h1',{className:'logo'},
          React.createElement('span',{className:'green'},'Debate'),
          React.createElement('span',{className:'white'},'OS')
        ),
      ),
      // Hero section
      React.createElement('div',{className:'hero'},
        React.createElement('h2',{className:'hero-title'},
          'The ',
          React.createElement('span',{className:'accent'},'AI toolkit'),
          ' for competitive debaters'
        ),
        React.createElement('p',{className:'hero-tagline'},
          'Generate cases, simulate rounds, map arguments, and get judge-level feedback.'
        ),
      ),
      React.createElement('nav',{className:'nav'},
        TABS.map(t =>
          t.divider
            ? React.createElement('div',{key:t.id,className:'nav-divider'})
            : t.href
            ? React.createElement('a',{
                key:t.id,
                className:'nav-btn',
                href:t.href,
                target:'_blank',
                rel:'noopener noreferrer',
                style:{textDecoration:'none'},
              }, t.label + ' \u2197')
            : React.createElement('button',{
                key:t.id,
                className:'nav-btn'+(tab===t.id?' active':''),
                onClick:()=>setTab(t.id)
              },t.label)
        )
      ),
      // All tabs rendered but only active one visible — preserves state across switches
      tabPane('case', React.createElement(CaseGenerator, { onSave: saveCase, loadedCase: loadedCase, onClearLoaded: () => setLoadedCase(null) })),
      tabPane('simulator', React.createElement(RoundSimulator)),
      tabPane('feedback', React.createElement(CaseFeedback)),
      tabPane('res', React.createElement(Resolutions)),
      tabPane('vision', React.createElement(RoundVision)),
      tabPane('casual', React.createElement(Casual)),
      tabPane('phil', React.createElement(Philosophy)),
      tabPane('practice', React.createElement(Practice)),
      tabPane('judge', React.createElement(Judge)),
      tabPane('forum', React.createElement(Forum, { user: user, onSignIn: () => setShowAuth(true) })),
      tabPane('newbies', React.createElement(Newbies)),
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
