[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/app/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/app"
  to = "/"
  status = 200
