[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"

[functions]
  external_node_modules = []
  node_bundler = "esbuild"

# Extend function timeout for streaming AI responses
[functions."claude"]
  timeout = 60

[functions."perplexity"]
  timeout = 30
